<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：電流と電圧</title>
<style>
:root{color-scheme:dark;--bg:#03070c;--panel:#071421;--card:#0b1826;--line:#5f7d99;--dim:#263b50;--txt:#eef8ff;--sub:#a8bacb;--blue:#58a8ff;--cyan:#66e5ff;--green:#78efc4;--yellow:#ffd166;--pink:#ff6b9a;--orange:#ff9f6e;--purple:#c99cff;--bad:#ff6b7d}*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;background:radial-gradient(900px 520px at 50% -160px,#1f4568,#07111c 58%,#03060b);color:var(--txt);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}.app{height:100dvh;display:flex;flex-direction:column;gap:8px;padding:9px;max-width:1180px;margin:0 auto}.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.ttl{min-width:0}h1{font-size:clamp(18px,4.8vw,30px);line-height:1.05;margin:0}.sub{font-size:12px;color:var(--sub);margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ctrl{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:nowrap}button{border:1px solid #31516d;border-radius:12px;background:#0b1b2b;color:#e8f6ff;padding:9px 10px;font-weight:900;min-height:38px;font-size:13px;cursor:pointer;white-space:nowrap}.primary{background:#1c6dff;border-color:#6aa5ff}.autoOn{background:#0d2d2a;border-color:#62e0be;color:#dcfff6}.stage{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1.42fr) minmax(300px,.82fr);gap:9px}.card{background:rgba(7,17,28,.9);border:1px solid #243d55;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}.fig{min-height:0;display:flex}.fig svg{width:100%;height:100%;display:block}.side{padding:12px;display:grid;grid-template-rows:auto auto auto 1fr;gap:9px;min-height:0}.stepbar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dot{height:8px;border-radius:99px;background:#183047;border:0;min-height:8px;padding:0}.dot.on{background:linear-gradient(90deg,var(--green),var(--blue),var(--yellow))}.stepTitle{margin:0;font-size:20px;line-height:1.25}.lead{margin:0;color:#d7e6f2;line-height:1.62;font-size:14px}.meters{display:grid;grid-template-columns:1fr 1fr;gap:7px}.meterBox{background:#071827;border:1px solid #2d4c66;border-radius:14px;padding:8px}.meterBox b{display:block;font-size:11px;color:#91caff;margin-bottom:4px}.meterBox .v{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:20px;font-weight:950;color:var(--yellow)}.meterBox .m{font-size:11px;color:#aebfce;line-height:1.35;margin-top:2px}.note{font-size:13px;color:#b8c9d8;line-height:1.62;margin:0;overflow:auto;padding-right:2px}.legend{display:flex;gap:7px;flex-wrap:wrap;color:#94aabc;font-size:11px}.pill{border:1px solid #2e4b64;border-radius:999px;padding:4px 7px;background:#081929}.circuitBg{fill:#081522;stroke:#244056}.wire{fill:none;stroke:var(--line);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.wireDim{fill:none;stroke:var(--dim);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#4a6988;stroke-width:3}.rx{fill:#2d1f18;stroke:#ff9f6e}.rr{fill:#3a1b27;stroke:#ff6b9a}.rs{fill:#182c22;stroke:#78efc4}.aux{fill:#102d39;stroke:#66e4ff}.source{fill:#102437;stroke:#90c3ff;stroke-width:4}.meterG{fill:#1b1230;stroke:#c99cff;stroke-width:4}.node{fill:#e1f3ff;stroke:#07111b;stroke-width:4}.label{fill:#f5fbff;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px}.labelS{font-size:21px}.jp{fill:#b9cada;font-weight:850;font-size:17px}.micro{fill:#94a9bb;font-weight:750;font-size:13px}.hl{fill:#ffd166;font-weight:950;font-size:18px}.ll{fill:#78efc4;font-weight:950;font-size:18px}.currentPath{fill:none;stroke:#ffd166;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.18}.currentPath.on{opacity:.9;filter:url(#glow)}.auxPath{stroke:#66e5ff}.gPath{stroke:#c99cff}.drop{fill:none;stroke:#ffd166;stroke-width:6;stroke-dasharray:10 10;stroke-linecap:round;opacity:0}.drop.on{opacity:.85}.dimmed{opacity:.22}.bright{opacity:1;filter:url(#glow)}.hide{opacity:0}.show{opacity:1}.particle{fill:#fff3a8;stroke:#ff9f1c;stroke-width:3;filter:url(#glow)}.particle2{fill:#a8f6ff;stroke:#30d4ff}.particle3{fill:#e9ceff;stroke:#c99cff}.voltRail{stroke:#36536d;stroke-width:7;stroke-linecap:round}.vpM{fill:#ffd166;stroke:#08111c;stroke-width:4}.vpN{fill:#66e5ff;stroke:#08111c;stroke-width:4}.vt{fill:#e7f4ff;font-weight:950;font-size:15px}.callBox{fill:#06101b;stroke:#31516d;stroke-width:2}.callText{fill:#e8f6ff;font-size:14px;font-weight:850}.warn{fill:#ffdde3;font-weight:900;font-size:14px}.ok{fill:#dbfff5;font-weight:900;font-size:14px}@media(max-width:850px){.app{padding:7px;gap:6px}.top{grid-template-columns:1fr}.ctrl{justify-content:stretch}.ctrl button{flex:1;padding:8px 6px;font-size:12px}.stage{grid-template-columns:1fr;grid-template-rows:58dvh 1fr;gap:7px}.side{padding:10px;grid-template-rows:auto auto auto 1fr}.stepTitle{font-size:17px}.lead{font-size:13px;line-height:1.48}.meters{grid-template-columns:1fr 1fr}.meterBox{padding:7px}.meterBox .v{font-size:17px}.note{font-size:12px;line-height:1.48}.legend{display:none}.sub{white-space:normal;font-size:11px}.stepbar{gap:4px}.dot{height:7px;min-height:7px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
  <div class="ttl"><h1>ケルビンダブルブリッジ</h1><p class="sub">自動再生。黄色=主電流、水色=補助腕電流、紫=検流計電流。</p></div>
  <div class="ctrl"><button id="back">戻る</button><button id="play" class="autoOn">自動 ON</button><button id="next" class="primary">次へ</button></div>
</header>
<section class="stage">
<div class="card fig">
<svg viewBox="0 0 940 620" aria-label="電流と電圧を追うケルビンダブルブリッジ">
<defs><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect x="18" y="18" width="904" height="584" rx="28" class="circuitBg"/>
<text x="68" y="60" class="hl">H = 100</text><text x="762" y="60" class="ll">L = 0</text>
<path d="M140 150 H792 V480 H140 Z" class="wire" data-g="loop"/><path d="M140 150 V480" class="wireDim"/><path d="M792 150 V480" class="wireDim"/>
<circle cx="104" cy="315" r="36" class="source" data-g="loop"/><text x="104" y="324" text-anchor="middle" class="label">E</text>
<circle cx="140" cy="150" r="7" class="node"/><circle cx="792" cy="150" r="7" class="node"/><circle cx="140" cy="480" r="7" class="node"/><circle cx="792" cy="480" r="7" class="node"/>
<g data-g="top balance result"><line x1="250" y1="150" x2="250" y2="480" class="wire"/><rect x="207" y="205" width="86" height="58" rx="14" class="part"/><text x="250" y="243" text-anchor="middle" class="label">P</text><rect x="207" y="365" width="86" height="58" rx="14" class="part"/><text x="250" y="403" text-anchor="middle" class="label">Q</text><circle cx="250" cy="315" r="8" class="node"/><text x="184" y="132" class="jp">比較用</text></g>
<g data-g="lower trouble pq balance result"><rect x="344" y="451" width="120" height="58" rx="14" class="part rx"/><text x="404" y="489" text-anchor="middle" class="label">Rx</text><rect x="496" y="451" width="82" height="58" rx="14" class="part rr"/><text x="537" y="489" text-anchor="middle" class="label">r</text><rect x="612" y="451" width="122" height="58" rx="14" class="part rs"/><text x="673" y="489" text-anchor="middle" class="label">Rs</text><text x="404" y="535" text-anchor="middle" class="micro">未知</text><text x="537" y="535" text-anchor="middle" class="micro">接続抵抗</text><text x="673" y="535" text-anchor="middle" class="micro">標準</text></g>
<g data-g="pq balance result"><path d="M496 480 C496 350 578 350 578 480" class="wire" stroke="#66e5ff"/><rect x="468" y="330" width="62" height="48" rx="13" class="part aux"/><text x="499" y="362" text-anchor="middle" class="label labelS">p</text><rect x="544" y="330" width="62" height="48" rx="13" class="part aux"/><text x="575" y="362" text-anchor="middle" class="label labelS">q</text><circle cx="537" cy="354" r="8" class="node"/><text x="450" y="304" class="jp">r の途中点 N</text></g>
<g data-g="balance result"><path d="M250 315 H384 C414 315 414 354 444 354 H537" class="wire" stroke="#c99cff"/><circle cx="398" cy="315" r="30" class="meterG"/><text x="398" y="324" text-anchor="middle" class="label">G</text></g>
<path id="mainPath" d="M142 480 H344 H464 H496 H578 H612 H734 H792 V150 H250 V315" class="currentPath" data-g="lower top balance result"/>
<path id="bottomCurrent" d="M142 480 H344 H464 H496 H578 H612 H734 H792" class="currentPath" data-g="lower trouble pq balance result"/>
<path id="topCurrent" d="M792 150 H250 V315 V480 H140" class="currentPath" data-g="top balance result"/>
<path id="auxCurrent" d="M496 480 C496 350 578 350 578 480" class="currentPath auxPath" data-g="pq balance result"/>
<path id="gCurrent" d="M250 315 H384 C414 315 414 354 537 354" class="currentPath gPath" data-g="trouble"/>
<path id="dropRx" d="M344 445 V380" class="drop"/><path id="dropR" d="M537 445 V380" class="drop"/><path id="dropRs" d="M673 445 V380" class="drop"/>
<g data-g="voltage"><line x1="842" y1="126" x2="842" y2="510" class="voltRail"/><text x="810" y="113" class="hl">100</text><text x="820" y="540" class="ll">0</text><circle id="pM" cx="842" cy="300" r="11" class="vpM"/><text id="txtM" x="860" y="305" class="vt">M=50</text><circle id="pN" cx="842" cy="345" r="11" class="vpN"/><text id="txtN" x="860" y="350" class="vt">N=42</text><text x="754" y="584" class="micro">電圧の高さ</text></g>
<g id="msgBox"><rect x="560" y="106" width="286" height="94" rx="16" class="callBox"/><text id="msg1" x="703" y="139" text-anchor="middle" class="callText">主電流が下側を流れる</text><text id="msg2" x="703" y="166" text-anchor="middle" class="callText">抵抗ごとに電圧が下がる</text><text id="msg3" x="703" y="190" text-anchor="middle" class="warn"></text></g>
<g id="resultBox" class="hide"><rect x="560" y="214" width="286" height="74" rx="16" fill="#17283d" stroke="#ffd166"/><text x="703" y="245" text-anchor="middle" class="micro">平衡後に残る関係</text><text x="703" y="274" text-anchor="middle" class="label labelS" fill="#ffd166">Rx = Rs × P/Q</text></g>
<circle id="dot1" r="8" class="particle"/><circle id="dot2" r="8" class="particle"/><circle id="dot3" r="7" class="particle2"/><circle id="dot4" r="7" class="particle3"/>
</svg>
</div>
<aside class="card side">
  <div class="stepbar" id="dots"></div>
  <h2 class="stepTitle" id="title"></h2>
  <p class="lead" id="lead"></p>
  <div class="meters"><div class="meterBox"><b>比較点 M</b><div class="v" id="vm">V_M = 50</div><div class="m" id="vmNote">P,Q で作る電圧</div></div><div class="meterBox"><b>r 側の点 N</b><div class="v" id="vn">V_N = 42</div><div class="m" id="vnNote">p,q で作る電圧</div></div></div>
  <p class="note" id="note"></p>
  <div class="legend"><span class="pill">黄色：主電流</span><span class="pill">水色：p,q の電流</span><span class="pill">紫：G 電流</span></div>
</aside>
</section>
</main>
<script>
const steps=[
{f:'loop',t:'1. 電源が電圧の高さ差を作る',lead:'左を高い電位、右を低い電位として見る。電流は高い側から低い側へ流れ、抵抗を通るたびに電圧が下がる。',note:'まず全体を見るだけ。ここでは式を立てない。黄色の粒が主電流。',m:50,n:50,msg:['電源で H=100, L=0 を作る','電流はその高さ差で流れる',''],paths:['bottomCurrent']},
{f:'lower',t:'2. 下側の主電流を追う',lead:'下側では Rx、r、Rs を順に通る。だから r にも小さい電圧降下が出る。低抵抗測定ではここが無視できない。',note:'黄色の粒が Rx → r → Rs を通る。縦の点線はそこで電圧が落ちている印。',m:50,n:42,msg:['Rx → r → Rs で電圧が下がる','r にも電圧降下がある','r が混ざる'],paths:['bottomCurrent'],drops:['dropRx','dropR','dropRs']},
{f:'trouble',t:'3. r のせいで検流計に電流が流れる',lead:'上側の比較点 M と、下側の取り出し点 N の電位がずれると、G に電流が流れる。これは平衡していない状態。',note:'紫の粒が G に流れる。つまり M と N の高さが違う。',m:50,n:42,msg:['M と N の高さが違う','G に電流が流れる','未平衡'],paths:['bottomCurrent','gCurrent'],g:true},
{f:'pq',t:'4. p,q で r の途中の電圧 N を作る',lead:'p,q は r を消す部品ではない。r の両端をまたぎ、r の電圧降下の途中に N という電位を作る。',note:'水色の粒が p,q 側を流れる。p,q の比で N の高さが動く。',m:50,n:46,msg:['p,q が r の途中点 N を作る','N の高さを調整できる',''],paths:['bottomCurrent','auxCurrent'],aux:true},
{f:'top',t:'5. P,Q で比較点 M を作る',lead:'P,Q は上側の分圧器。全体の電圧差の途中に M という比較用の電位を作る。',note:'M は P,Q の比で決まる。N は p,q の比で決まる。やりたいのは M と N の高さ合わせ。',m:50,n:46,msg:['P,Q が M を作る','p,q が N を作る','まだ少しズレ'],paths:['topCurrent','auxCurrent']},
{f:'balance',t:'6. M と N を同じ高さにする',lead:'調整して V_M と V_N が一致すると、G の両端に電圧差がない。だから G の電流が止まる。',note:'紫の電流が消える。これが G=0 の意味。式ではなく、まず電圧の高さが同じと読む。',m:50,n:50,msg:['V_M = V_N','G の電流が止まる','平衡'],paths:['bottomCurrent','topCurrent','auxCurrent'],aux:true},
{f:'result',t:'7. r の影響だけが比較から外れる',lead:'P/Q と p/q をそろえて平衡させると、r の電圧降下は同じ割合で拾われる。だから比較から r の影響だけが外れ、Rx と Rs の関係が残る。',note:'最後だけ式で読む。ここまでの主役は M と N の高さ合わせ。',m:50,n:50,msg:['P/Q = p/q','r の影響が外れる',''],paths:['bottomCurrent','topCurrent','auxCurrent'],aux:true,result:true}
];
let step=0, playing=true, last=0, autoTimer=0;const DURATION=5200;const $=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));
const dots=$('#dots');steps.forEach((_,i)=>{const b=document.createElement('button');b.className='dot';b.onclick=()=>{step=i;autoTimer=0;render()};dots.appendChild(b)});
function showGroups(f){$$('[data-g]').forEach(el=>{const list=(el.dataset.g||'').split(' ');const active=list.includes(f)||list.includes('loop')&&f==='loop'||list.includes('voltage')||list.includes('all');el.classList.toggle('dimmed',!active);el.classList.toggle('bright',active)});}
function render(){const s=steps[step];$('#title').textContent=s.t;$('#lead').textContent=s.lead;$('#note').textContent=s.note;$('#vm').textContent='V_M = '+s.m;$('#vn').textContent='V_N = '+s.n;$('#vmNote').textContent=s.m===s.n?'N と同じ高さ':'P,Q で作る比較電圧';$('#vnNote').textContent=s.m===s.n?'M と同じ高さ':'p,q で調整する電圧';$('#pM').setAttribute('cy',510-s.m*3.84);$('#pN').setAttribute('cy',510-s.n*3.84);$('#txtM').setAttribute('y',515-s.m*3.84);$('#txtM').textContent='M='+s.m;$('#txtN').setAttribute('y',538-s.n*3.84);$('#txtN').textContent='N='+s.n;$('#msg1').textContent=s.msg[0];$('#msg2').textContent=s.msg[1];$('#msg3').textContent=s.msg[2]||'';$('#msg3').setAttribute('class',s.msg[2]==='平衡'?'ok':'warn');$$('.dot').forEach((d,i)=>d.classList.toggle('on',i===step));showGroups(s.f);$$('.currentPath').forEach(p=>p.classList.remove('on'));(s.paths||[]).forEach(id=>$('#'+id).classList.add('on'));$$('.drop').forEach(p=>p.classList.remove('on'));(s.drops||[]).forEach(id=>$('#'+id).classList.add('on'));$('#resultBox').setAttribute('class',s.result?'show':'hide');$('#play').textContent=playing?'自動 ON':'自動 OFF';$('#play').className=playing?'autoOn':''}
function pointOn(id,phase){const p=$('#'+id);const len=p.getTotalLength();return p.getPointAtLength((phase%1)*len)}
function moveDot(dot,id,phase,visible=true){const d=$(dot);if(!visible){d.style.display='none';return}d.style.display='block';const pt=pointOn(id,phase);d.setAttribute('cx',pt.x);d.setAttribute('cy',pt.y)}
function tick(ts){if(!last)last=ts;const dt=ts-last;last=ts;const s=steps[step];if(playing){autoTimer+=dt;if(autoTimer>DURATION){autoTimer=0;step=(step+1)%steps.length;render()}}const phase=(ts/2100)%1;const active=s.paths||[];moveDot('#dot1',active.includes('bottomCurrent')?'bottomCurrent':active.includes('topCurrent')?'topCurrent':'bottomCurrent',phase,active.includes('bottomCurrent')||active.includes('topCurrent'));
moveDot('#dot2',active.includes('bottomCurrent')?'bottomCurrent':'topCurrent',phase+.42,active.includes('bottomCurrent')||active.includes('topCurrent'));
moveDot('#dot3','auxCurrent',phase+.2,active.includes('auxCurrent'));
moveDot('#dot4','gCurrent',phase+.1,active.includes('gCurrent'));
requestAnimationFrame(tick)}
$('#play').onclick=()=>{playing=!playing;autoTimer=0;render()};$('#back').onclick=()=>{step=(step+steps.length-1)%steps.length;autoTimer=0;render()};$('#next').onclick=()=>{step=(step+1)%steps.length;autoTimer=0;render()};render();requestAnimationFrame(tick);
</script>
</body>
</html>
