<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ケルビンダブルブリッジ：教材版</title>
<style>
:root{color-scheme:dark;--bg:#06111c;--card:#071827;--ink:#eef8ff;--sub:#a9bdce;--wire:#9cb5c9;--dim:#33495d;--main:#ffd166;--top:#5db1ff;--aux:#66e5ff;--gal:#caa0ff;--ok:#78efc4;--bad:#ff6b8a;--orange:#ff9f6e}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(1000px 560px at 50% -180px,#1c4268,#06111c 58%,#02060b);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif}body{overflow-y:auto;-webkit-overflow-scrolling:touch}.app{max-width:1220px;margin:0 auto;padding:8px 8px 28px}.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(#06111c 76%,rgba(6,17,28,.78));backdrop-filter:blur(8px);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0 8px}h1{margin:0;font-size:clamp(18px,4.8vw,31px);line-height:1.05}.sub{margin:4px 0 0;color:var(--sub);font-size:12px}.controls{display:flex;gap:6px}button{border:1px solid #385a74;border-radius:12px;background:#0c1e30;color:#eaf7ff;min-height:38px;padding:9px 10px;font-weight:900;font-size:13px;cursor:pointer;white-space:nowrap}.primary{background:#1b6dff;border-color:#6ba7ff}.playing{background:#0d342f;border-color:#65dfbd;color:#dcfff5}.layout{display:grid;grid-template-columns:minmax(0,1.44fr) minmax(310px,.84fr);gap:9px}.card{background:rgba(6,18,30,.94);border:1px solid #284258;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.34);overflow:hidden}.figure svg{width:100%;height:auto;display:block}.side{padding:12px;display:grid;align-content:start;gap:10px}.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.stepDot{height:8px;min-height:8px;padding:0;border:0;border-radius:999px;background:#173047}.stepDot.on{background:linear-gradient(90deg,var(--ok),var(--top),var(--main))}.title{margin:0;font-size:20px;line-height:1.25}.lead{margin:0;color:#d8e7f2;line-height:1.62;font-size:14px}.flowBox{background:#071827;border:1px solid #31536d;border-radius:14px;padding:9px}.flowBox b{display:block;color:#9fd1ff;font-size:11px;margin-bottom:5px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px;font-weight:950;color:var(--main);line-height:1.4}.cap{font-size:12px;line-height:1.5;color:#aec1d0;margin-top:4px}.meterGrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.meter{background:#071827;border:1px solid #31536d;border-radius:14px;padding:8px}.meter b{display:block;color:#9fd1ff;font-size:11px;margin-bottom:4px}.meter .val{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:950;color:var(--main)}.meter .cap{font-size:11px;color:#acbfcd}.note{margin:0;font-size:13px;line-height:1.62;color:#b9cada}.mini{display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:#9eb0c0}.pill{background:#081929;border:1px solid #33516a;border-radius:999px;padding:4px 7px}details{background:#061624;border:1px solid #263e55;border-radius:14px;padding:9px;color:#b8c9d7;font-size:12px;line-height:1.5}summary{cursor:pointer;font-weight:900;color:#d9efff}.bg{fill:#081522;stroke:#29465e}.wire{fill:none;stroke:var(--wire);stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.part{fill:#102337;stroke:#5b7892;stroke-width:3}.rx{fill:#302117;stroke:var(--orange)}.rr{fill:#391b27;stroke:var(--bad)}.rs{fill:#172d22;stroke:var(--ok)}.aux{fill:#102d39;stroke:var(--aux)}.source{fill:#102437;stroke:#98c8ff;stroke-width:4}.meterG{fill:#1c1230;stroke:var(--gal);stroke-width:4}.node{fill:#e4f4ff;stroke:#07111b;stroke-width:4}.label{fill:#f6fbff;font:950 26px ui-monospace,SFMono-Regular,Menlo,monospace}.small{font-size:19px}.nodeTxt{fill:#e9f6ff;font-size:15px;font-weight:950}.tiny{fill:#9aafc0;font-size:12px;font-weight:780}.path{fill:none;stroke:var(--main);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.08}.path.on{opacity:.92;filter:url(#glow)}.pTop{stroke:var(--top)}.pAux{stroke:var(--aux)}.pGal{stroke:var(--gal)}.drop{fill:none;stroke:var(--main);stroke-width:6;stroke-linecap:round;stroke-dasharray:10 10;opacity:0}.drop.on{opacity:.86}.dim{opacity:.24}.strong{filter:url(#glow)}.hide{opacity:0}.show{opacity:1}.box{fill:#06131f;stroke:#31516a;stroke-width:2}.boxText{fill:#e9f7ff;font-size:14px;font-weight:850}.resultText{fill:#ffd166;font:950 20px ui-monospace,SFMono-Regular,Menlo,monospace}@media(max-width:860px){.app{padding:7px 7px 30px}.topbar{grid-template-columns:1fr;padding-top:4px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr}.controls button{padding:8px 6px;font-size:12px}.layout{display:block}.figure{height:60svh;margin-bottom:8px}.figure svg{height:100%;width:100%}.side{margin-top:8px}.title{font-size:17px}.lead{font-size:13px;line-height:1.52}.mono{font-size:14px}.meter .val{font-size:16px}.note{font-size:12px;line-height:1.52}.mini{display:none}.sub{font-size:11px}.stepDot{height:7px;min-height:7px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar">
  <div><h1>ケルビンダブルブリッジ</h1><p class="sub">6番以降を整理。最後は「Gが0になったら読む」だけにしました。</p></div>
  <div class="controls"><button id="back">戻る</button><button id="play" class="playing">自動 ON</button><button id="next" class="primary">次へ</button></div>
</header>
<section class="layout">
<div class="card figure">
<svg viewBox="0 0 1000 650" aria-label="Kelvin double bridge teaching diagram">
<defs><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect x="18" y="18" width="964" height="614" rx="28" class="bg"/>
<circle cx="80" cy="450" r="9" class="node"/><text x="58" y="487" class="nodeTxt">A</text><text x="40" y="515" class="tiny">高電位</text>
<circle cx="940" cy="450" r="9" class="node"/><text x="930" y="487" class="nodeTxt">D</text><text x="918" y="515" class="tiny">低電位</text>
<g data-g="source"><circle cx="80" cy="545" r="32" class="source"/><text x="80" y="554" text-anchor="middle" class="label">E</text><text x="35" y="602" class="tiny">電源内部で戻る</text></g>
<path d="M80 450 V130 H210" class="wire" data-g="all top source"/><path d="M940 450 V130 H790" class="wire" data-g="all top source"/>
<g data-g="main result"><path d="M80 450 H180" class="wire"/><rect x="180" y="416" width="130" height="68" rx="16" class="part rx"/><text x="245" y="459" text-anchor="middle" class="label">Rx</text><path d="M310 450 H360" class="wire"/><circle cx="360" cy="450" r="9" class="node"/><text x="350" y="488" class="nodeTxt">B</text><path d="M360 450 H455" class="wire"/><rect x="455" y="416" width="90" height="68" rx="16" class="part rr"/><text x="500" y="459" text-anchor="middle" class="label">r</text><path d="M545 450 H700" class="wire"/><circle cx="700" cy="450" r="9" class="node"/><text x="690" y="488" class="nodeTxt">C</text><path d="M700 450 H780" class="wire"/><rect x="780" y="416" width="120" height="68" rx="16" class="part rs"/><text x="840" y="459" text-anchor="middle" class="label">Rs</text><path d="M900 450 H940" class="wire"/></g>
<g data-g="aux balance result"><path d="M360 450 V285 H410" class="wire" stroke="#66e5ff"/><rect x="410" y="251" width="80" height="68" rx="16" class="part aux"/><text x="450" y="294" text-anchor="middle" class="label small">p</text><path d="M490 285 H555" class="wire" stroke="#66e5ff"/><circle cx="555" cy="285" r="9" class="node"/><text x="547" y="259" class="nodeTxt">N</text><path d="M555 285 H620" class="wire" stroke="#66e5ff"/><rect x="620" y="251" width="80" height="68" rx="16" class="part aux"/><text x="660" y="294" text-anchor="middle" class="label small">q</text><path d="M700 285 V450" class="wire" stroke="#66e5ff"/></g>
<g data-g="top balance result"><path d="M210 130 H240" class="wire"/><rect x="240" y="96" width="105" height="68" rx="16" class="part"/><text x="292" y="139" text-anchor="middle" class="label">P</text><path d="M345 130 H500" class="wire"/><circle cx="500" cy="130" r="9" class="node"/><text x="493" y="104" class="nodeTxt">M</text><path d="M500 130 H655" class="wire"/><rect x="655" y="96" width="105" height="68" rx="16" class="part"/><text x="708" y="139" text-anchor="middle" class="label">Q</text><path d="M760 130 H790" class="wire"/></g>
<g data-g="gal balance result"><path d="M500 130 C525 178 540 230 555 285" class="wire" stroke="#c99cff"/><circle cx="528" cy="207" r="30" class="meterG"/><text x="528" y="216" text-anchor="middle" class="label">G</text></g>
<path id="mainPath" d="M80 450 H180 H310 H360 H455 H545 H700 H780 H900 H940" class="path"/>
<path id="topPath" d="M80 450 V130 H240 H345 H500 H655 H760 H940 V450" class="path pTop"/>
<path id="auxPath" d="M360 450 V285 H410 H490 H555 H620 H700 V450" class="path pAux"/>
<path id="galPath" d="M555 285 C540 230 525 178 500 130" class="path pGal"/>
<path id="dropRx" d="M245 406 V360" class="drop"/><path id="dropR" d="M500 406 V360" class="drop"/><path id="dropRs" d="M840 406 V360" class="drop"/>
<g><rect x="52" y="38" width="360" height="48" rx="14" class="box"/><text id="msg1" x="232" y="68" text-anchor="middle" class="boxText">見る線を1本に絞る</text><rect x="610" y="38" width="332" height="48" rx="14" class="box"/><text id="msg2" x="776" y="68" text-anchor="middle" class="boxText">最後は G=0 の瞬間だけ読む</text></g>
<g id="resultBox" class="hide"><rect x="610" y="186" width="320" height="82" rx="16" fill="#17283d" stroke="#ffd166"/><text x="770" y="216" text-anchor="middle" class="tiny">G=0 になった瞬間</text><text x="770" y="250" text-anchor="middle" class="resultText">Rx = Rs × P/Q</text></g>
</svg>
</div>
<aside class="card side">
  <div class="steps" id="stepDots"></div>
  <h2 class="title" id="title"></h2>
  <p class="lead" id="lead"></p>
  <div class="flowBox"><b>見る電流</b><div class="mono" id="flow"></div><div class="cap" id="flowCap"></div></div>
  <div class="meterGrid"><div class="meter"><b>比較点 M</b><div class="val" id="vm">V_M = 50</div><div class="cap" id="vmNote"></div></div><div class="meter"><b>補助点 N</b><div class="val" id="vn">V_N = 50</div><div class="cap" id="vnNote"></div></div></div>
  <p class="note" id="note"></p>
  <div class="mini"><span class="pill">黄: 主電流</span><span class="pill">青: 比較腕</span><span class="pill">水: 補助腕</span><span class="pill">紫: 検流計</span></div>
  <details><summary>最後の読み方</summary><p>難しく見る必要はありません。検流計が0なら、MとNは同じ高さです。その状態を作るために比をそろえます。比がそろっていれば、r の影響を同じ割合で拾うため、答えは Rx = Rs × P/Q です。</p></details>
</aside>
</section>
</main>
<script>
const steps=[
{g:'source',title:'1. まず外部回路の向きを固定',lead:'外部回路は A から D へ流れる。D から A へ戻すのは電源内部だけ。',flow:'外部: A → D',cap:'逆流に見える線は使わない。',vm:'—',vn:'—',vmNote:'まだ見ない',vnNote:'まだ見ない',note:'ここは回路全体の向きだけ確認する。',paths:[],drops:[],msg:['外部回路は A → D','戻りは電源内部だけ']},
{g:'main',title:'2. 主電流だけを見る',lead:'主電流は Rx、r、Rs を順番に通る。',flow:'A → Rx → B → r → C → Rs → D',cap:'r にも電圧が落ちる。ここが邪魔。',vm:'—',vn:'—',vmNote:'まだ見ない',vnNote:'まだ見ない',note:'この段階では、未知抵抗 Rx だけを測りたいのに r も混ざる、と分かればよい。',paths:['mainPath'],drops:['dropRx','dropR','dropRs'],msg:['主電流を追う','r も測定に混ざる']},
{g:'top',title:'3. 上側で M を作る',lead:'P,Q は A と D の間にある比較用の枝。途中の点 M を作る。',flow:'A → P → M → Q → D',cap:'M は比較用の電圧点。',vm:'V_M = 50',vn:'—',vmNote:'P,Q が作る点',vnNote:'まだ見ない',note:'M は「上側のものさし」の目盛りです。',paths:['topPath'],drops:[],msg:['P,Q で M を作る','M は比較用の点']},
{g:'aux',title:'4. r の近くで N を作る',lead:'p,q は B と C の間にある補助枝。途中の点 N を作る。',flow:'B → p → N → q → C',cap:'N は r の途中の電圧点。',vm:'V_M = 50',vn:'V_N = 58',vmNote:'比較用の点',vnNote:'p,q が作る点',note:'N は「r の電圧降下をどの位置で見るか」を決める点です。',paths:['auxPath'],drops:['dropR'],msg:['p,q で N を作る','N は r 側の点']},
{g:'gal',title:'5. M と N が違えば G に流れる',lead:'M と N の高さが違うと、検流計 G に電流が流れる。これは「まだ合っていない」の合図。',flow:'N → G → M',cap:'例として N の方が高いので、N から M へ流す。',vm:'V_M = 50',vn:'V_N = 58',vmNote:'低い',vnNote:'高い',note:'この時点では答えを読まない。G が0になるまで調整する。',paths:['galPath'],drops:[],msg:['V_M ≠ V_N','G に電流が流れる']},
{g:'balance',title:'6. G=0 になった瞬間に読む',lead:'M と N が同じ高さになると、G に電流は流れない。この瞬間だけが測定点。',flow:'G の電流 = 0',cap:'V_M と V_N が同じ。だから左右を比較できる。',vm:'V_M = 50',vn:'V_N = 50',vmNote:'N と同じ',vnNote:'M と同じ',note:'ここで比をそろえておくと r の影響が外れる。最後に Rx = Rs × P/Q と読む。',paths:['topPath','auxPath','mainPath'],drops:[],msg:['V_M = V_N','G=0 の瞬間に読む'],result:true}
];
let idx=0,playing=true,timer=null;const $=q=>document.querySelector(q),$$=q=>Array.from(document.querySelectorAll(q));
steps.forEach((_,i)=>{const b=document.createElement('button');b.className='stepDot';b.onclick=()=>{idx=i;render();reset()};$('#stepDots').appendChild(b)});
function render(){const s=steps[idx];$('#title').textContent=s.title;$('#lead').textContent=s.lead;$('#flow').textContent=s.flow;$('#flowCap').textContent=s.cap;$('#vm').textContent=s.vm;$('#vn').textContent=s.vn;$('#vmNote').textContent=s.vmNote;$('#vnNote').textContent=s.vnNote;$('#note').textContent=s.note;$('#msg1').textContent=s.msg[0];$('#msg2').textContent=s.msg[1];$$('.stepDot').forEach((d,i)=>d.classList.toggle('on',i===idx));$$('[data-g]').forEach(el=>{const list=(el.dataset.g||'').split(' ');const active=list.includes(s.g)||list.includes('all');el.classList.toggle('dim',!active);el.classList.toggle('strong',active)});$$('.path').forEach(p=>p.classList.remove('on'));(s.paths||[]).forEach(id=>$('#'+id).classList.add('on'));$$('.drop').forEach(p=>p.classList.remove('on'));(s.drops||[]).forEach(id=>$('#'+id).classList.add('on'));$('#resultBox').setAttribute('class',s.result?'show':'hide');$('#play').textContent=playing?'自動 ON':'自動 OFF';$('#play').className=playing?'playing':''}
function reset(){if(timer)clearInterval(timer);if(playing)timer=setInterval(()=>{idx=(idx+1)%steps.length;render()},5600)}
$('#play').onclick=()=>{playing=!playing;render();reset()};$('#back').onclick=()=>{idx=(idx+steps.length-1)%steps.length;render();reset()};$('#next').onclick=()=>{idx=(idx+1)%steps.length;render();reset()};render();reset();
</script>
</body>
</html>
