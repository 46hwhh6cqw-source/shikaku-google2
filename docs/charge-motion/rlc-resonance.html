<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RLCを目で理解する — 電荷・場のエネルギー・無効電力・共振</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:#0E1116;color:#E6EDF3;font-family:Inter,system-ui,-apple-system,sans-serif;}
.wrap{max-width:520px;margin:0 auto;padding:16px;}
h1{font-size:16px;font-weight:700;margin:0 0 4px;}
.sub{font-size:12px;color:#8B97A5;line-height:1.55;margin:0 0 12px;}
.sub b{color:#E6EDF3;}
.seg{display:flex;border:1px solid #3A434F;border-radius:8px;overflow:hidden;background:#0E1116;margin-bottom:10px;}
.seg button{flex:1;min-height:44px;border:none;background:transparent;color:#8B97A5;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:600;cursor:pointer;padding:0 4px;}
.seg button.on{background:#F2A93B;color:#0E1116;}
.seg.b button.on{background:#56C2E6;}
.panel{background:#161B22;border:1px solid #1B2129;border-radius:12px;padding:8px;margin-bottom:10px;}
canvas{display:block;width:100%;}
.expl{padding:11px 13px;background:#161B22;border-radius:8px;border-left:3px solid #4FE08A;font-size:13px;line-height:1.55;margin-bottom:10px;min-height:20px;}
.controls{display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:8px;align-items:center;}
.primary{flex:1;min-height:48px;border:none;border-radius:8px;background:#F2A93B;color:#0E1116;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
.pluck{flex:1;min-height:48px;border:1px solid #4FE08A;border-radius:8px;background:#0E1116;color:#4FE08A;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
.ghost{min-height:48px;padding:0 16px;border:1px solid #3A434F;border-radius:8px;background:#0E1116;color:#8B97A5;font-size:15px;cursor:pointer;font-family:inherit;}
.step{min-width:50px;min-height:46px;border:1px solid #3A434F;border-radius:8px;background:#0E1116;color:#E6EDF3;font-size:20px;cursor:pointer;font-family:inherit;}
.lab{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8B97A5;}
.prm{display:flex;justify-content:space-between;align-items:baseline;}
.val{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#E6EDF3;}
.hide{display:none;}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;width:100%;height:6px;border-radius:3px;background:#3A434F;outline:none;touch-action:none;margin:6px 0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#F2A93B;cursor:pointer;border:3px solid #161B22;}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#F2A93B;cursor:pointer;border:3px solid #161B22;}
</style>
</head>
<body>
<div class="wrap">
  <h1>RLCを目で理解する — 電荷・場のエネルギー</h1>
  <p class="sub">電荷の総数は一定（保存）。<b style="color:#F2A93B">C</b>は電荷を<b>分けて溜める</b>＝電圧をつくり押し返す（ばね）。<b style="color:#56C2E6">L</b>は電荷を溜めず、<b>流れる電荷が磁場をつくり流れを保つ</b>（慣性）。場に貯めて返すのが<b>無効電力</b>、Rで熱になって戻らないのが<b>有効電力</b>。</p>

  <div class="panel"><canvas id="cCirc"></canvas></div>
  <div class="panel"><canvas id="cLedger"></canvas></div>
  <div id="expl" class="expl"></div>

  <div class="controls">
    <div class="seg b"><button data-mode="free" class="on">自由振動（弾く）</button><button data-mode="driven">強制（共振を見る）</button></div>
    <div class="row">
      <button id="play" class="primary">▶ 再生</button>
      <button id="pluck" class="pluck">⚡ Cに電荷を貯めて放す</button>
      <button id="reset" class="ghost">⟲</button>
    </div>
    <div id="freqWrap" class="hide">
      <div class="prm"><span class="lab">周波数 f / f₀（1.0 で共振）</span><span class="val" id="fval">1.00</span></div>
      <div class="row"><button class="step" id="fdn">−</button><input id="freq" type="range" min="-0.7" max="0.7" step="0.005" value="0"><button class="step" id="fup">＋</button></div>
    </div>
    <div>
      <div class="prm"><span class="lab">抵抗 R（熱で失う量＝減衰）</span><span class="val" id="rval">0.15</span></div>
      <div class="row"><button class="step" id="rdn">−</button><input id="res" type="range" min="0" max="1.5" step="0.01" value="0.15"><button class="step" id="rup">＋</button></div>
    </div>
    <div>
      <div class="prm"><span class="lab">速さ</span><span class="val" id="sval">1.0×</span></div>
      <div class="row"><input id="spd" type="range" min="0.3" max="2.2" step="0.1" value="1"></div>
    </div>
  </div>
</div>

<script>
// normalized series RLC (L=C=1, w0=1): q'' + R q' + q = drive(t).  state q,i.
// E_C = 0.5 q^2 (electric field in C),  E_L = 0.5 i^2 (magnetic field in L),
// heat = ∫ R i^2 dt (energy lost in R, never returns).
(function(){
  var C={bg:"#0E1116",panel:"#161B22",grid:"#1B2129",wire:"#3A434F",text:"#E6EDF3",muted:"#8B97A5",
         elec:"#F2A93B",mag:"#56C2E6",heat:"#E5683C",real:"#4FE08A",ghost:"#586374",ret:"#56C2E6"};
  var MONO="ui-monospace, SFMono-Regular, Menlo, monospace";
  var $=function(id){return document.getElementById(id);};
  var st={mode:"free",playing:false,R:0.15,rIdx:0,spd:1};
  var sim={q:0,i:0,t:0,heat:0};
  var envQ=1e-6,envI=1e-6,envE=1e-6, last=null, prevEc=0;
  var ctx;

  function setup(id,h){var cv=$(id);return{cv:cv,cx:cv.getContext("2d"),h:h};}
  var CIRC=setup("cCirc",206), LED=setup("cLedger",118);
  function fitOne(o){var w=Math.min(o.cv.parentNode.clientWidth,504);if(w<10)w=320;var dpr=window.devicePixelRatio||1;
    o.cv.style.width=w+"px";o.cv.style.height=(w*o.h/360)+"px";o.cv.width=Math.round(w*dpr);o.cv.height=Math.round(w*o.h/360*dpr);
    o.cx.setTransform(o.cv.width/360,0,0,o.cv.width/360,0,0);}
  function fitAll(){fitOne(CIRC);fitOne(LED);}

  function line(x1,y1,x2,y2,col,lw){ctx.strokeStyle=col;ctx.lineWidth=lw||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  function disc(x,y,r,col,a){ctx.save();ctx.globalAlpha=a==null?1:a;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,6.2832);ctx.fill();ctx.restore();}
  function txt(t,x,y,col,size,weight,align){ctx.save();ctx.fillStyle=col;ctx.font=(weight||400)+" "+size+"px "+MONO;ctx.textAlign=align||"start";ctx.textBaseline="alphabetic";ctx.fillText(t,x,y);ctx.restore();}
  function arrowT(x,y,dir,size,col,a){ctx.save();ctx.globalAlpha=a==null?1:a;ctx.fillStyle=col;ctx.beginPath();
    if(dir==="up"){ctx.moveTo(x,y-size);ctx.lineTo(x-size*0.8,y);ctx.lineTo(x+size*0.8,y);}else if(dir==="down"){ctx.moveTo(x,y+size);ctx.lineTo(x-size*0.8,y);ctx.lineTo(x+size*0.8,y);}
    else if(dir==="right"){ctx.moveTo(x+size,y);ctx.lineTo(x,y-size*0.8);ctx.lineTo(x,y+size*0.8);}else{ctx.moveTo(x-size,y);ctx.lineTo(x,y-size*0.8);ctx.lineTo(x,y+size*0.8);}
    ctx.closePath();ctx.fill();ctx.restore();}

  // physics step
  function iprime(q,i){var drive=st.mode==="free"?0:Math.sin(curW*sim.t);return drive-st.R*i-q;}
  var curW=1;
  function rk4(dt){var q=sim.q,i=sim.i,t=sim.t;
    function f(q,i,t){var drive=st.mode==="free"?0:Math.sin(curW*t);return [i,drive-st.R*i-q];}
    var k1=f(q,i,t),k2=f(q+dt/2*k1[0],i+dt/2*k1[1],t+dt/2),k3=f(q+dt/2*k2[0],i+dt/2*k2[1],t+dt/2),k4=f(q+dt*k3[0],i+dt*k3[1],t+dt);
    var ni=i+dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    sim.q=q+dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    sim.heat+=st.R*((i+ni)/2)*((i+ni)/2)*dt;  // R i^2 dt
    sim.i=ni;sim.t+=dt;}

  // open conductor (broken only at the capacitor gap). NQ charges, count conserved.
  var x1=60,x2=300,yt=46,yb=168,pL=150,pR=210,pyT=38,pyB=58;
  var cond=[[pR,yt],[x2,yt],[x2,yb],[x1,yb],[x1,yt],[pL,yt]];
  var CL=(function(){var t=0,k;for(k=0;k<cond.length-1;k++)t+=Math.hypot(cond[k+1][0]-cond[k][0],cond[k+1][1]-cond[k][1]);return t;})();
  function condAt(d){var x=d,k;for(k=0;k<cond.length-1;k++){var a=cond[k],b=cond[k+1],l=Math.hypot(b[0]-a[0],b[1]-a[1]);if(x<=l){var u=l?x/l:0;return [a[0]+(b[0]-a[0])*u,a[1]+(b[1]-a[1])*u];}x-=l;}return cond[cond.length-1];}
  var NQ=24;
  function stackPos(side,k){var col=Math.floor(k/6),row=k%6;return side==="L"?[158+col*9,64+row*9]:[202-col*9,64+row*9];}

  function drawCirc(){
    ctx=CIRC.cx;ctx.fillStyle=C.bg;ctx.fillRect(0,0,360,CIRC.h);
    var q=sim.q,i=sim.i,El=0.5*i*i;
    var qn=Math.max(-1,Math.min(q/envQ,1)), inorm=i/envI, eln=El/envE;
    // field tints (where the energy lives)
    ctx.save();ctx.globalAlpha=0.07+0.38*Math.min(Math.abs(qn),1);ctx.fillStyle=C.elec;ctx.fillRect(144,36,72,80);ctx.restore();
    ctx.save();ctx.globalAlpha=0.07+0.38*Math.min(Math.abs(eln),1);ctx.fillStyle=C.mag;ctx.fillRect(282,84,38,52);ctx.restore();
    // wires (gap only between the two plates at top)
    ctx.lineCap="round";
    line(pR,yt,x2,yt,C.wire,2.6);line(x2,yt,x2,84,C.wire,2.6);line(x2,136,x2,yb,C.wire,2.6);
    line(x2,yb,x1,yb,C.wire,2.6);line(x1,yb,x1,yt,C.wire,2.6);line(x1,yt,pL,yt,C.wire,2.6);
    // plates
    line(pL,pyT,pL,pyB,C.wire,3.2);line(pR,pyT,pR,pyB,C.wire,3.2);
    // distribute the NQ charges: flowing in the wire, or stacked on a plate (total conserved)
    var s=0.42*CL*qn, nL=0,nR=0,k,p,pp;
    for(k=0;k<NQ;k++){var e=(k+0.5)/NQ*CL,a=e+s;
      if(a>CL){p=stackPos("L",Math.min(nL++,11));disc(p[0],p[1],3.3,C.elec,0.95);}
      else if(a<0){p=stackPos("R",Math.min(nR++,11));disc(p[0],p[1],3.3,C.elec,0.95);}
      else{pp=condAt(a);disc(pp[0],pp[1],2.7,C.elec,0.9);}}
    var sep=nL+nR, inWire=NQ-sep;
    // vacated slots (holes) on the depleted plate -> count is obviously conserved
    for(k=0;k<nL;k++){p=stackPos("R",Math.min(k,11));ctx.save();ctx.strokeStyle=C.ghost;ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(p[0],p[1],3.3,0,6.2832);ctx.stroke();ctx.restore();}
    for(k=0;k<nR;k++){p=stackPos("L",Math.min(k,11));ctx.save();ctx.strokeStyle=C.ghost;ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(p[0],p[1],3.3,0,6.2832);ctx.stroke();ctx.restore();}
    // electric field lines across the gap (grow with separated charge)
    if(sep>0){ctx.save();ctx.strokeStyle=C.elec;ctx.globalAlpha=0.15+0.5*Math.min(Math.abs(qn),1);var m;for(m=0;m<3;m++){var yy=pyT+4+m*7;line(pL+3,yy,pR-3,yy,C.elec,1);}ctx.restore();}
    var netL=nL-nR;
    txt(netL>0?"＋":netL<0?"−":"",pL-9,34,netL>0?C.elec:C.mag,12,700,"center");
    txt(netL>0?"−":netL<0?"＋":"",pR+9,34,netL>0?C.mag:C.elec,12,700,"center");
    txt("C",180,128,C.elec,11,700,"center");
    txt("電界：分かれた電荷が電圧をつくり、押し返す（ばね）",180,16,C.muted,9,400,"center");
    // L coil + magnetic field: made by MOVING charge; it keeps the flow going
    var cx=x2,y0=88,y1=132,seg=(y1-y0)/4,r=seg/2;
    if(Math.abs(inorm)>0.04){ctx.save();ctx.strokeStyle=C.mag;ctx.globalAlpha=0.25+0.5*Math.min(Math.abs(inorm),1);var rr;for(rr=0;rr<3;rr++){ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,(y0+y1)/2,7+rr*5,-1.15,1.15);ctx.stroke();}ctx.restore();}
    ctx.save();ctx.strokeStyle=C.wire;ctx.lineWidth=2.6;for(k=0;k<4;k++){var cyy=y0+seg*(k+0.5);ctx.beginPath();ctx.arc(cx,cyy,r,Math.PI/2,-Math.PI/2,true);ctx.stroke();}ctx.restore();
    txt("L",274,114,C.mag,11,700);
    txt("磁界：流れる電荷がつくり、流れを保つ（慣性）",x2-4,158,C.mag,8.5,400,"end");
    // R + heat
    var hN=Math.min(st.R*i*i/(envE+1e-9),1);
    ctx.fillStyle=C.panel;ctx.strokeStyle=C.wire;ctx.lineWidth=2;ctx.beginPath();ctx.rect(162,yb-7,36,14);ctx.fill();ctx.stroke();
    if(hN>0.02){disc(180,yb,12,C.heat,0.5*hN);}
    txt("R",180,yb+16,C.muted,11,400,"center");
    // source
    ctx.save();ctx.fillStyle=C.panel;ctx.strokeStyle=st.mode==="free"?C.ghost:C.elec;ctx.lineWidth=2;ctx.beginPath();ctx.arc(x1,107,12,0,6.2832);ctx.fill();ctx.stroke();
    if(st.mode!=="free"){ctx.strokeStyle=C.elec;ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(x1-7,107);ctx.bezierCurveTo(x1-4,101,x1-2,101,x1,107);ctx.bezierCurveTo(x1+2,113,x1+4,113,x1+7,107);ctx.stroke();}
    ctx.restore();
    if(st.mode!=="free"){var ps=Math.sin(curW*sim.t)*i;if(Math.abs(ps)>0.02*envE){arrowT(x1+20,107,ps>0?"up":"down",6,ps>0?C.real:C.ret,0.95);}}
    // conserved-count readout
    txt("Cに分離 "+sep+" 個 ＋ 導線を流れる "+inWire+" 個 ＝ 合計 "+NQ+" 個（保存）",180,CIRC.h-7,C.muted,9.5,400,"center");
  }

  function drawLedger(){
    ctx=LED.cx;ctx.fillStyle=C.bg;ctx.fillRect(0,0,360,LED.h);
    var Ec=0.5*sim.q*sim.q,El=0.5*sim.i*sim.i,store=Ec+El,tot=store+sim.heat;
    var ref=Math.max(envE, tot, 1e-6);
    txt("エネルギーの行き先",12,15,C.muted,10);
    // three stacked / grouped bars
    var bw=64,gap=26,x0=18,top=26,bh=64;
    function bar(x,frac,col,lab,sub){ctx.save();ctx.strokeStyle=C.grid;ctx.lineWidth=1;ctx.strokeRect(x,top,bw,bh);
      var fh=Math.max(0,Math.min(frac,1))*bh;ctx.fillStyle=col;ctx.globalAlpha=0.9;ctx.fillRect(x,top+bh-fh,bw,fh);ctx.restore();
      txt(lab,x+bw/2,top+bh+13,col,9.5,700,"center");txt(sub,x+bw/2,top+bh+24,C.muted,8.5,400,"center");}
    bar(x0,Ec/ref,C.elec,"電界 C","");
    bar(x0+bw+gap,El/ref,C.mag,"磁界 L","");
    // total stored marker line over the two reactive bars (shows C+L exchange conserved)
    var yt=top+bh-Math.min(store/ref,1)*bh;
    ctx.save();ctx.strokeStyle=C.text;ctx.setLineDash([4,3]);ctx.globalAlpha=0.7;line(x0,yt,x0+2*bw+gap,yt,C.text,1.4);ctx.setLineDash([]);ctx.restore();
    txt("C+L 合計",x0+2*bw+gap-2,yt-3<top+8?top+12:yt-3,C.text,8,400,"end");
    // heat bar (only grows)
    var hx=x0+2*(bw+gap)+6;
    bar(hx,sim.heat/ref,C.heat,"熱 R","");
    // group captions (no overlap)
    txt("無効＝往復して戻る",x0+bw+gap/2,LED.h-7,C.muted,9.5,400,"center");
    txt("有効＝熱で消える",hx+bw/2,LED.h-7,C.heat,9.5,400,"center");
  }

  function updateExpl(){
    var el=$("expl"),Ec=0.5*sim.q*sim.q,El=0.5*sim.i*sim.i,s,col=C.real;
    var nq=Math.abs(sim.q)/envQ, ni=Math.abs(sim.i)/envI, dEc=sim.q*sim.i;
    if(!st.playing && sim.q===0 && sim.i===0){
      s=st.mode==="free"?"「⚡Cに電荷を貯めて放す」を押すと、電荷が L↔C を往復。電界と磁界が交互に満ち、Rがあれば少しずつ熱になって減衰します。":"▶ 再生。f を f₀ に合わせると、電源が無効分を出さずに済む＝共振。";col=C.muted;
    } else if(nq>0.82){s="Cが満タン：電荷が極板に最大、電流ゼロ。エネルギーは全部 電界 に（折り返し）。";col=C.elec;}
    else if(ni>0.82){s="Lに最大電流：極板は空、電荷が最速。エネルギーは全部 磁界 に。";col=C.mag;}
    else if(dEc>0){s="磁界 → 電界：電流が電荷を運び C を充電中（Lのエネルギーが C へ戻る/移る）。";col=C.elec;}
    else{s="電界 → 磁界：C が放電し電流を増やす（C のエネルギーが L へ移る）。";col=C.mag;}
    if(st.mode==="driven"&&st.playing&&Math.abs(st.rIdx)>=0.08){s="共振から外れ（"+(st.rIdx>0?"誘導性":"容量性")+"）：電源が無効エネルギーを往復で負担（左の電源矢印が大きく往復）。f₀へ寄せると往復が減ります。";col=C.muted;}
    if(st.mode==="driven"&&Math.abs(st.rIdx)<0.02&&st.playing)s="⚡共振(f=f₀)：LとCが直接エネルギーを渡し合い、電源は R の消費分（有効）だけ供給。無効の往復は L↔C 内で完結。";
    if(st.R<0.001&&st.mode==="free"&&st.playing)s="R=0：熱で失わないので C+L 合計は一定のまま永久に往復＝純粋な無効エネルギーの行き来。";
    el.textContent=s;el.style.borderLeftColor=col;
  }

  function frame(ts){
    if(last==null)last=ts;var dt=(ts-last)/1000;last=ts;if(dt>0.05)dt=0.05;
    curW=Math.pow(10,st.rIdx);
    if(st.playing){var dSim=dt*2.2*st.spd,sub=Math.max(1,Math.ceil(dSim/0.02)),h=dSim/sub,k;for(k=0;k<sub;k++)rk4(h);}
    var Ec=0.5*sim.q*sim.q,El=0.5*sim.i*sim.i;
    envQ=Math.max(envQ*0.992,Math.abs(sim.q),1e-6);
    envI=Math.max(envI*0.992,Math.abs(sim.i),1e-6);
    envE=Math.max(envE*0.992,Ec+El,1e-6);
    drawCirc();drawLedger();updateExpl();
    requestAnimationFrame(frame);
  }

  // controls
  function syncMode(){document.querySelectorAll("[data-mode]").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-mode")===st.mode);});
    $("freqWrap").classList.toggle("hide",st.mode!=="driven");$("pluck").classList.toggle("hide",st.mode!=="free");}
  function setPlay(){$("play").textContent=st.playing?"⏸ 一時停止":"▶ 再生";}
  function resetSim(){sim={q:0,i:0,t:0,heat:0};envQ=1e-6;envI=1e-6;envE=1e-6;last=null;}
  function pluck(){st.mode="free";syncMode();sim={q:1.0,i:0,t:0,heat:0};envQ=1;envI=1e-6;envE=0.5;last=null;st.playing=true;setPlay();}

  document.querySelectorAll("[data-mode]").forEach(function(b){b.addEventListener("click",function(){st.mode=b.getAttribute("data-mode");syncMode();st.playing=false;setPlay();resetSim();});});
  $("play").addEventListener("click",function(){st.playing=!st.playing;last=null;setPlay();});
  $("pluck").addEventListener("click",pluck);
  $("reset").addEventListener("click",function(){st.playing=false;setPlay();resetSim();});
  $("freq").addEventListener("input",function(e){st.rIdx=parseFloat(e.target.value);$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("fdn").addEventListener("click",function(){st.rIdx=Math.max(st.rIdx-0.02,-0.7);$("freq").value=st.rIdx;$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("fup").addEventListener("click",function(){st.rIdx=Math.min(st.rIdx+0.02,0.7);$("freq").value=st.rIdx;$("fval").textContent=Math.pow(10,st.rIdx).toFixed(2);});
  $("res").addEventListener("input",function(e){st.R=parseFloat(e.target.value);$("rval").textContent=st.R.toFixed(2);});
  $("rdn").addEventListener("click",function(){st.R=Math.max(st.R-0.05,0);$("res").value=st.R;$("rval").textContent=st.R.toFixed(2);});
  $("rup").addEventListener("click",function(){st.R=Math.min(st.R+0.05,1.5);$("res").value=st.R;$("rval").textContent=st.R.toFixed(2);});
  $("spd").addEventListener("input",function(e){st.spd=parseFloat(e.target.value);$("sval").textContent=st.spd.toFixed(1)+"×";});
  window.addEventListener("resize",fitAll);

  syncMode();fitAll();requestAnimationFrame(frame);
})();
</script>
</body>
</html>
