<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>回路を流れる電荷</title><style>body{margin:0;background:#0E1116;color:#E6EDF3;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;padding:16px}.app{max-width:560px;margin:auto}h1{font-size:19px;margin:0}.sub,.note{color:#8B97A5;font-size:12.5px;line-height:1.6}.top{display:flex;justify-content:space-between;align-items:baseline}.meta{font:11px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--c,#F2A93B)}.box{background:#161B22;border:1px solid #1B2129;border-radius:12px;padding:8px;margin-top:12px}svg{width:100%;display:block}.status{margin-top:10px;background:#161B22;border-left:3px solid var(--c,#F2A93B);border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.5}.ctrl{display:grid;gap:10px;margin-top:14px}.row{display:flex;gap:8px}.row button{flex:1}.seg{display:flex;border:1px solid #3A434F;border-radius:8px;overflow:hidden}.seg button{flex:1;background:#0E1116;color:#8B97A5;border:0;padding:9px 6px;font:12.5px ui-monospace,SFMono-Regular,Menlo,monospace}.seg button.on{background:var(--c,#F2A93B);color:#0E1116;font-weight:800}button{cursor:pointer;border:0;border-radius:8px;padding:11px;background:#0E1116;color:#8B97A5;border:1px solid #3A434F}.play{background:var(--c,#F2A93B);color:#0E1116;font-weight:800}input{width:100%;accent-color:var(--c,#F2A93B)}.info{display:none;background:#161B22;border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;color:#8B97A5}.info.show{display:block}.info b{color:#E6EDF3}</style></head><body><div class="app"><div class="top"><h1>回路を流れる電荷</h1><span class="meta" id="meta">DC · ＋</span></div><p class="sub">静止状態から、電源を起点に動き出します。電荷は最初から導線内にあります。</p><a href="./lab.html" style="display:inline-block;margin-bottom:4px;padding:8px 12px;border-radius:8px;border:1px solid #3A434F;background:#161B22;color:#F2A93B;text-decoration:none;font:12.5px ui-monospace,SFMono-Regular,Menlo,monospace">⚡ 直列・並列 RLC 回路と共振 →</a><div class="box"><svg id="svg" viewBox="0 0 360 270"></svg></div><div class="status" id="status"></div><div class="box"><div class="sub">電流 i(t) ＝ 電荷の速度</div><svg id="wave" viewBox="0 0 320 64"></svg></div><div class="ctrl"><div class="row"><button id="play" class="play">▶ 再生</button><button id="reset">⟲ 最初から</button></div><div class="seg"><button data-mode="DC" class="on">直流 DC</button><button data-mode="AC">交流 AC</button></div><div class="seg"><button data-car="conv" class="on">慣用電流（＋）</button><button data-car="electron">電子（−）</button></div><div><div class="sub">速さ</div><input id="speed" type="range" min="0.2" max="1.8" step="0.05" value="0.7"></div><button id="ib">▸ 物理メモ（正しい描像）</button><div id="info" class="info">・導線には<b>最初から電荷が詰まっています</b>。電源は電荷を供給するというより、動かす条件を作ります。<br>・電子のドリフトは遅いです。回路全体がすぐ反応するのは、<b>電界の変化が速く伝わる</b>からです。<br>・慣用電流は正電荷の向き。金属中の電子は逆向きにドリフトします。<br>・交流では電荷は往復し、一周期での正味移動はほぼゼロです。</div></div></div><script>const N=24,GX1=70,GX2=300,GY1=60,GY2=210,ST=120,SB=150,RT=117,RB=153;const segs=[{l:ST-GY1,p:u=>[GX1,ST-u]},{l:GX2-GX1,p:u=>[GX1+u,GY1]},{l:GY2-GY1,p:u=>[GX2,GY1+u]},{l:GX2-GX1,p:u=>[GX2-u,GY2]},{l:GY2-SB,p:u=>[GX1,GY2-u]},{l:SB-ST,p:u=>[GX1,SB-u]}],L=segs.reduce((a,s)=>a+s.l,0),base=Array.from({length:N},(_,i)=>i*L/N);let st={play:false,mode:'DC',car:'conv',speed:.7},sim={t:0,G:0,act:Array(N).fill(null),last:null},raf=null;const C={conv:'#F2A93B',electron:'#56C2E6',rest:'#586374',wire:'#3A434F',grid:'#1B2129',trace:'#4FE08A'};function arc(s){let x=((s%L)+L)%L;for(const g of segs){if(x<=g.l)return g.p(x);x-=g.l}return segs[0].p(0)}function dist(b){const d=((b%L)+L)%L;return Math.min(d,L-d)}const Vf=(L/2)/1.3,Vdc=55,Fac=.32,Wac=2*Math.PI*Fac,Vac=Wac*30;function vel(t){if(st.mode==='AC')return Vac*Math.sin(Wac*t);let r=Math.min(t/.8,1);return Vdc*(r*r*(3-2*r))}function reset(){sim={t:0,G:0,act:Array(N).fill(null),last:null};st.play=false;render()}function tick(ts){if(!st.play){raf=null;return}if(sim.last==null)sim.last=ts;let dt=Math.min((ts-sim.last)/1000,.05);sim.last=ts;let ds=dt*st.speed,v=vel(sim.t);sim.t+=ds;sim.G+=v*ds;let f=Vf*sim.t;for(let i=0;i<N;i++)if(sim.act[i]==null&&dist(base[i])<=f)sim.act[i]=sim.G;render();raf=requestAnimationFrame(tick)}function render(){let cc=C[st.car],dir=st.car==='conv'?1:-1,front=Vf*sim.t,on=front>=L/2,sign=st.mode==='AC'?(Math.sin(Wac*sim.t)>=0?1:-1):1;document.documentElement.style.setProperty('--c',cc);meta.textContent=st.mode+' · '+(st.car==='conv'?'＋':'e⁻');play.textContent=st.play?'⏸ 一時停止':'▶ 再生';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===st.mode));document.querySelectorAll('[data-car]').forEach(b=>b.classList.toggle('on',b.dataset.car===st.car));let q=base.map((b,i)=>{let off=sim.act[i]==null?0:sim.G-sim.act[i],p=arc(b+dir*off),h=arc(b);return{x:p[0],y:p[1],hx:h[0],hy:h[1],on:sim.act[i]!=null}});let pulses='';if(sim.t>0&&!on){let op=1-front/(L/2);for(const a of [front,-front]){let p=arc(a);pulses+=`<circle cx="${p[0]}" cy="${p[1]}" r="9" fill="none" stroke="${cc}" stroke-width="2" opacity="${.5*op}"/>`}}let ch=(x,y)=>{let d=sign>0?1:-1;return`<polyline points="${x-4*d},${y-4} ${x+4*d},${y} ${x-4*d},${y+4}" fill="none" stroke="#8B97A5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity=".7"/>`};svg.innerHTML=`<defs><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${Array.from({length:8},(_,i)=>`<line x1="${20+i*45}" y1="20" x2="${20+i*45}" y2="250" stroke="${C.grid}"/>`).join('')}${Array.from({length:5},(_,i)=>`<line x1="20" y1="${40+i*50}" x2="340" y2="${40+i*50}" stroke="${C.grid}"/>`).join('')}<g stroke="${C.wire}" stroke-width="2.5" fill="none" stroke-linecap="round"><line x1="70" y1="60" x2="70" y2="120"/><line x1="70" y1="60" x2="300" y2="60"/><line x1="300" y1="60" x2="300" y2="117"/><line x1="300" y1="153" x2="300" y2="210"/><line x1="300" y1="210" x2="70" y2="210"/><line x1="70" y1="210" x2="70" y2="150"/></g><rect x="291" y="117" width="18" height="36" rx="2" fill="#161B22" stroke="${C.wire}" stroke-width="2"/><text x="320" y="139" fill="#8B97A5" font-size="11">R</text>${st.mode==='DC'?`<g stroke="${cc}" stroke-linecap="round"><line x1="56" y1="127" x2="84" y2="127" stroke-width="2"/><line x1="63" y1="134" x2="77" y2="134" stroke-width="4.5"/></g>`:`<circle cx="70" cy="135" r="15" fill="#161B22" stroke="${cc}" stroke-width="2"/><path d="M61 135 C64 127,67 127,70 135 S76 143,79 135" fill="none" stroke="${cc}" stroke-width="1.8"/>`}<text x="48" y="118" fill="${sign>0?cc:'#8B97A5'}" font-size="13">${sign>0?'＋':'−'}</text><text x="50" y="166" fill="${sign>0?'#8B97A5':cc}" font-size="13">${sign>0?'−':'＋'}</text>${on?ch(150,60)+ch(210,60):''}${st.mode==='AC'?q.map(c=>`<circle cx="${c.hx}" cy="${c.hy}" r="5.4" fill="none" stroke="${C.rest}" opacity=".45"/>`).join(''):''}${pulses}${q.map(c=>`<circle cx="${c.x}" cy="${c.y}" r="${c.on?5:4.3}" fill="${c.on?cc:C.rest}" opacity="${c.on?1:.55}" ${c.on?'filter="url(#glow)"':''}/>`).join('')}`;let now=st.mode==='AC'?Vac*Math.sin(Wac*sim.t):(sim.t>0?Vdc*Math.min(sim.t/.8,1):0);status.textContent=!st.play&&sim.t===0?'停止中 — 導線には電荷が詰まっています。再生で電源が押し始めます':!on?'電源を起点に押し（電界）が広がり、電荷が静止から動き出します':st.mode==='DC'?'一定の力で一方向へ。電流の大きさは時間によらず一定です':now>.06*Vac?'正の半サイクル：電荷は前進（電流は正）':now<-.06*Vac?'負の半サイクル：電荷は後退（電流は負）':'電圧が反転 — 電荷は速度ゼロで一瞬停止します';drawWave()}function drawWave(){let W=320,H=64,m=H/2,a=20,span=5*Math.PI,h=`<line x1="0" y1="${m}" x2="${W}" y2="${m}" stroke="${C.grid}"/>`;if(st.mode==='AC'){let p='';for(let x=0;x<=W;x+=4){let ph=x/W*span,y=m-a*Math.sin(ph);p+=(x?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '}let ph=Wac*sim.t,cx=(ph%span)/span*W,cy=m-a*Math.sin(ph);h+=`<path d="${p}" fill="none" stroke="${C.trace}" stroke-width="1.6"/><line x1="${cx}" y1="2" x2="${cx}" y2="62" stroke="#8B97A5" opacity=".5"/><circle cx="${cx}" cy="${cy}" r="3.5" fill="${C.trace}"/>`}else h+=`<line x1="0" y1="${m-a*.6}" x2="${W}" y2="${m-a*.6}" stroke="${C.trace}" stroke-width="1.6"/><text x="314" y="${m-a*.6-5}" fill="#8B97A5" font-size="9" text-anchor="end">一定</text>`;wave.innerHTML=h}play.onclick=()=>{st.play=!st.play;render();if(st.play&&!raf)raf=requestAnimationFrame(tick)};reset.onclick=reset;document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{st.mode=b.dataset.mode;reset();});document.querySelectorAll('[data-car]').forEach(b=>b.onclick=()=>{st.car=b.dataset.car;reset();});speed.oninput=e=>st.speed=parseFloat(e.target.value);ib.onclick=()=>{info.classList.toggle('show');ib.textContent=(info.classList.contains('show')?'▾':'▸')+' 物理メモ（正しい描像）'};render();</script></body></html>
