<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>RLC回路と共振 — 最新版</title>
<style>
:root{color-scheme:dark;--bg:#0E1116;--panel:#161B22;--grid:#1B2129;--wire:#3A434F;--text:#E6EDF3;--muted:#8B97A5;--accent:#F2A93B;--r:#F2A93B;--l:#7C9CF2;--c:#E66FB0;--ok:#4FE08A}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}body{padding:16px}.app{max-width:620px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.top h1{font-size:20px;margin:0}.sub{font-size:12.5px;line-height:1.55;color:var(--muted);margin:5px 0 0}.badge{font:700 11px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ok);border:1px solid #31536d;border-radius:999px;padding:5px 8px;white-space:nowrap}.card{background:var(--panel);border:1px solid var(--grid);border-radius:14px;padding:10px;margin-top:12px}.tabs{display:flex;border:1px solid var(--wire);border-radius:10px;overflow:hidden;background:var(--bg);margin-top:12px}.tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 6px;font:700 12px ui-monospace,SFMono-Regular,Menlo,monospace}.tabs button.on{background:var(--accent);color:#0E1116}.stage{width:100%;display:block}.status{margin-top:10px;background:#0E1116;border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;font-size:12.5px;line-height:1.55}.ctrl{display:grid;gap:10px}.label{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:4px}.label b{color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}input{width:100%;accent-color:var(--accent)}.two{display:grid;grid-template-columns:1fr 140px;gap:10px;align-items:start}.read{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}.read div{display:flex;justify-content:space-between;gap:8px}.read span:first-child{color:var(--muted)}.read span:last-child{font-weight:800}.back{display:inline-block;margin-top:12px;color:var(--accent);text-decoration:none;font-size:12.5px;font-weight:800}@media(max-width:520px){body{padding:12px}.two{grid-template-columns:1fr}.top{display:block}.badge{display:inline-block;margin-top:8px}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div>
      <h1>RLC回路と共振</h1>
      <p class="sub">最新の単独HTML版。React/Babel/外部CDN/ローカル読み込みに依存しないので、GitHub Pages上でそのまま動きます。</p>
    </div>
    <div class="badge">static v2026-06-24</div>
  </header>

  <div class="tabs">
    <button id="tabSeries" class="on">直列 RLC</button>
    <button id="tabParallel">並列 RLC</button>
  </div>

  <section class="card">
    <svg id="stage" class="stage" viewBox="0 0 360 245" role="img" aria-label="RLC circuit animation"></svg>
    <div id="status" class="status"></div>
  </section>

  <section class="card ctrl">
    <div>
      <div class="label"><span>周波数</span><b id="ratioLabel">f / f0 = 1.00</b></div>
      <input id="ratio" type="range" min="0" max="100" value="50" step="1" />
    </div>
    <div>
      <div class="label"><span>抵抗 R</span><b id="rLabel">50 Ω</b></div>
      <input id="r" type="range" min="10" max="220" value="50" step="5" />
    </div>
  </section>

  <section class="card two">
    <div>
      <div class="label"><span id="curveTitle">周波数応答</span><b>0.25〜4 f0</b></div>
      <svg id="curve" viewBox="0 0 320 110" style="width:100%;display:block"></svg>
    </div>
    <div>
      <div class="label"><span id="phasorTitle">フェーザ</span><b id="phaseLabel">0°</b></div>
      <svg id="phasor" viewBox="0 0 140 140" style="width:100%;display:block"></svg>
    </div>
  </section>

  <section class="card">
    <div id="read" class="read"></div>
  </section>

  <a class="back" href="./">単一ループの電荷ページへ戻る</a>
</main>

<script>
const SVG = "http://www.w3.org/2000/svg";
const V = 5;
const L = 0.1;
const CAP = 10e-6;
const colors = { bg:"#0E1116", panel:"#161B22", grid:"#1B2129", wire:"#3A434F", text:"#E6EDF3", muted:"#8B97A5", a:"#F2A93B", r:"#F2A93B", l:"#7C9CF2", c:"#E66FB0", ok:"#4FE08A" };
let mode = "series";
let tick = 0;

const el = id => document.getElementById(id);
const stage = el("stage"), curve = el("curve"), phasor = el("phasor"), read = el("read"), status = el("status");
const ratioInput = el("ratio"), rInput = el("r");

function ratioFromSlider(v){ return Math.pow(2, (Number(v) - 50) / 25); }
function fmtHz(f){ return f >= 1000 ? (f/1000).toFixed(2)+" kHz" : f.toFixed(0)+" Hz"; }
function fmt(x,d=0){ return Number.isFinite(x) ? x.toFixed(d) : "--"; }
function f0(){ return 1 / (2 * Math.PI * Math.sqrt(L * CAP)); }
function calc(ratio = ratioFromSlider(ratioInput.value), R = Number(rInput.value), m = mode){
  const fzero = f0();
  const f = fzero * ratio;
  const w = 2 * Math.PI * f;
  const XL = w * L;
  const XC = 1 / (w * CAP);
  if(m === "series"){
    const X = XL - XC;
    const Z = Math.hypot(R, X);
    const I = V / Z;
    const phi = Math.atan2(X, R);
    const Q = Math.sqrt(L / CAP) / R;
    return {ratio,R,fzero,f,XL,XC,Z,I,phi,Q,onRes:Math.abs(ratio-1)<0.035};
  }
  const G = 1 / R;
  const B = 1 / XC - 1 / XL;
  const Y = Math.hypot(G, B);
  const Z = 1 / Y;
  const I = V * Y;
  const IR = V / R, IL = V / XL, IC = V / XC;
  const phi = Math.atan2(B, G);
  const Q = R / Math.sqrt(L / CAP);
  return {ratio,R,fzero,f,XL,XC,Z,I,IR,IL,IC,phi,Q,onRes:Math.abs(ratio-1)<0.035};
}
function p(tag, attrs={}, children=[]){
  const n = document.createElementNS(SVG, tag);
  for(const [k,v] of Object.entries(attrs)) n.setAttribute(k, v);
  for(const c of children) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  return n;
}
function pointRect(s){
  const x1=64,y1=52,x2=300,y2=190;
  const a=x2-x1,b=y2-y1,Lp=2*(a+b);
  s=((s%Lp)+Lp)%Lp;
  if(s<a) return [x1+s,y1]; s-=a;
  if(s<b) return [x2,y1+s]; s-=b;
  if(s<a) return [x2-s,y2]; s-=a;
  return [x1,y2-s];
}
function drawDotsRect(g,d){
  const amp = Math.max(0.15, Math.min(2.2, d.I / (V / d.R)));
  const dir = d.phi > 0 ? 1 : 1;
  for(let i=0;i<28;i++){
    const [x,y] = pointRect(i*27 + tick*42*amp*dir);
    g.appendChild(p("circle",{cx:x,cy:y,r:4.2,fill:colors.a,opacity:0.95}));
  }
}
function branchDots(g,x,color,phase,scale){
  const n = 6;
  const y1=62,y2=190;
  const swing = Math.sin(tick*0.08 + phase) * 16 * Math.min(2.1, Math.max(0.25, scale));
  for(let i=0;i<n;i++){
    const y = y1 + (i+0.5)*(y2-y1)/n + swing;
    g.appendChild(p("circle",{cx:x,cy:y,r:4,fill:color,opacity:0.92}));
  }
}
function drawStage(){
  const d = calc();
  stage.innerHTML = "";
  const defs = p("defs",{},[
    p("filter",{id:"glow",x:"-50%",y:"-50%",width:"200%",height:"200%"},[
      p("feGaussianBlur",{stdDeviation:"2.2",result:"b"}),p("feMerge",{},[p("feMergeNode",{in:"b"}),p("feMergeNode",{in:"SourceGraphic"})])
    ])
  ]);
  stage.appendChild(defs);
  for(let i=0;i<8;i++) stage.appendChild(p("line",{x1:20+i*45,y1:20,x2:20+i*45,y2:225,stroke:colors.grid}));
  for(let i=0;i<5;i++) stage.appendChild(p("line",{x1:20,y1:35+i*45,x2:340,y2:35+i*45,stroke:colors.grid}));
  const g=p("g",{stroke:colors.wire,"stroke-width":2.5,fill:"none","stroke-linecap":"round"});
  if(mode === "series"){
    g.appendChild(p("rect",{x:64,y:52,width:236,height:138,rx:4})); stage.appendChild(g);
    const dots=p("g",{filter:"url(#glow)"}); drawDotsRect(dots,d); stage.appendChild(dots);
    stage.appendChild(p("circle",{cx:64,cy:121,r:15,fill:colors.panel,stroke:d.onRes?colors.ok:colors.a,"stroke-width":2}));
    stage.appendChild(p("path",{d:"M55 121 C59 112,63 112,67 121 S75 130,78 121",fill:"none",stroke:d.onRes?colors.ok:colors.a,"stroke-width":2}));
    stage.appendChild(p("rect",{x:160,y:44,width:50,height:16,rx:2,fill:colors.panel,stroke:colors.r,"stroke-width":2}));
    stage.appendChild(p("path",{d:"M300 93 c12 4 12 12 0 16 c12 4 12 12 0 16 c12 4 12 12 0 16",fill:"none",stroke:colors.l,"stroke-width":2}));
    stage.appendChild(p("line",{x1:170,y1:190,x2:170,y2:174,stroke:colors.c,"stroke-width":3}));
    stage.appendChild(p("line",{x1:200,y1:190,x2:200,y2:174,stroke:colors.c,"stroke-width":3}));
    label(185,36,"R",colors.r); label(314,126,"L",colors.l); label(185,215,"C",colors.c);
  } else {
    g.appendChild(p("line",{x1:64,y1:62,x2:310,y2:62}));
    g.appendChild(p("line",{x1:64,y1:190,x2:310,y2:190}));
    g.appendChild(p("line",{x1:64,y1:62,x2:64,y2:190}));
    for(const x of [150,225,300]){ g.appendChild(p("line",{x1:x,y1:62,x2:x,y2:190})); }
    stage.appendChild(g);
    const dots=p("g",{filter:"url(#glow)"});
    branchDots(dots,150,colors.r,0,d.IR/(V/d.R));
    branchDots(dots,225,colors.l,-Math.PI/2,d.IL/(V/d.R));
    branchDots(dots,300,colors.c,Math.PI/2,d.IC/(V/d.R));
    branchDots(dots,64,colors.a,d.phi,d.I/(V/d.R));
    stage.appendChild(dots);
    stage.appendChild(p("circle",{cx:64,cy:126,r:15,fill:colors.panel,stroke:d.onRes?colors.ok:colors.a,"stroke-width":2}));
    stage.appendChild(p("path",{d:"M55 126 C59 117,63 117,67 126 S75 135,78 126",fill:"none",stroke:d.onRes?colors.ok:colors.a,"stroke-width":2}));
    stage.appendChild(p("rect",{x:141,y:105,width:18,height:42,rx:2,fill:colors.panel,stroke:colors.r,"stroke-width":2}));
    stage.appendChild(p("path",{d:"M225 105 c-4 8 -4 12 0 16 c4 8 4 12 0 16 c-4 8 -4 12 0 16",fill:"none",stroke:colors.l,"stroke-width":2}));
    stage.appendChild(p("line",{x1:291,y1:110,x2:309,y2:110,stroke:colors.c,"stroke-width":3}));
    stage.appendChild(p("line",{x1:291,y1:142,x2:309,y2:142,stroke:colors.c,"stroke-width":3}));
    label(150,98,"R",colors.r); label(225,98,"L",colors.l); label(300,98,"C",colors.c);
  }
  if(d.onRes) label(180,24,"⚡ RESONANCE",colors.ok);
  status.textContent = mode === "series"
    ? (d.onRes ? "直列共振：XL と XC が打ち消し、回路の見かけはほぼ R だけ。電流が最大になります。" : (d.XL>d.XC ? "直列RLC：今は誘導性寄り。電流は電圧より遅れます。" : "直列RLC：今は容量性寄り。電流は電圧より進みます。"))
    : (d.onRes ? "並列共振：L枝とC枝の電流が大きく循環し、電源から見た電流は最小になります。" : (d.XL>d.XC ? "並列RLC：合成は容量性寄り。" : "並列RLC：合成は誘導性寄り。"));
}
function label(x,y,text,color){
  stage.appendChild(p("text",{x,y,fill:color,"font-size":12,"font-family":"ui-monospace,SFMono-Regular,Menlo,monospace","font-weight":800,"text-anchor":"middle"},[text]));
}
function drawCurve(){
  const d=calc(); curve.innerHTML="";
  const W=320,H=110,ml=24,mr=8,mt=10,mb=20;
  const xs = r => ml + (Math.log2(r/0.25)/Math.log2(16))*(W-ml-mr);
  let vals=[];
  for(let i=0;i<=90;i++){
    const rr=0.25*Math.pow(16,i/90);
    const v=mode==="series" ? calc(rr,d.R,"series").I/(V/d.R) : calc(rr,d.R,"parallel").Z/d.R;
    vals.push({rr,v});
  }
  const vmax=Math.max(...vals.map(o=>o.v),1e-9);
  const ys = v => mt + (1 - v/vmax)*(H-mt-mb);
  for(const rr of [0.25,0.5,1,2,4]) curve.appendChild(p("line",{x1:xs(rr),y1:mt,x2:xs(rr),y2:H-mb,stroke:rr===1?colors.ok:colors.grid,"stroke-dasharray":rr===1?"4 4":""}));
  curve.appendChild(p("line",{x1:ml,y1:H-mb,x2:W-mr,y2:H-mb,stroke:colors.wire}));
  curve.appendChild(p("line",{x1:ml,y1:mt,x2:ml,y2:H-mb,stroke:colors.wire}));
  let path=""; vals.forEach((o,i)=>{path+=(i?"L":"M")+xs(o.rr).toFixed(1)+" "+ys(o.v).toFixed(1)+" ";});
  curve.appendChild(p("path",{d:path,fill:"none",stroke:colors.ok,"stroke-width":2}));
  const cx=xs(d.ratio), cy=ys(mode==="series"?d.I/(V/d.R):d.Z/d.R);
  curve.appendChild(p("line",{x1:cx,y1:mt,x2:cx,y2:H-mb,stroke:colors.muted,opacity:.65}));
  curve.appendChild(p("circle",{cx,cy,r:4,fill:colors.a}));
  curve.appendChild(p("text",{x:xs(1)+4,y:18,fill:colors.ok,"font-size":10,"font-family":"ui-monospace,SFMono-Regular,Menlo,monospace"},["f0"]));
  el("curveTitle").textContent = mode==="series" ? "周波数応答 |I|" : "周波数応答 |Z|";
}
function arrow(x2,y2,color,labelText,width=2){
  const cx=70,cy=70;
  phasor.appendChild(p("line",{x1:cx,y1:cy,x2:cx+x2,y2:cy-y2,stroke:color,"stroke-width":width,"stroke-linecap":"round"}));
  phasor.appendChild(p("circle",{cx:cx+x2,cy:cy-y2,r:3,fill:color}));
  phasor.appendChild(p("text",{x:cx+x2+(x2>=0?4:-4),y:cy-y2-3,fill:color,"font-size":10,"font-family":"ui-monospace,SFMono-Regular,Menlo,monospace","text-anchor":x2>=0?"start":"end"},[labelText]));
}
function drawPhasor(){
  const d=calc(); phasor.innerHTML="";
  phasor.appendChild(p("line",{x1:8,y1:70,x2:132,y2:70,stroke:colors.grid}));
  phasor.appendChild(p("line",{x1:70,y1:8,x2:70,y2:132,stroke:colors.grid}));
  if(mode==="series"){
    arrow(42,0,colors.r,"VR",2.3);
    arrow(0,Math.min(42,d.XL/d.R*18),colors.l,"VL",1.8);
    arrow(0,-Math.min(42,d.XC/d.R*18),colors.c,"VC",1.8);
    arrow(46*Math.cos(d.phi),46*Math.sin(d.phi),colors.a,"V",2.5);
    el("phasorTitle").textContent="電圧フェーザ";
  }else{
    arrow(42,0,colors.r,"IR",2.3);
    arrow(0,-Math.min(42,d.IL/(V/d.R)*18),colors.l,"IL",1.8);
    arrow(0,Math.min(42,d.IC/(V/d.R)*18),colors.c,"IC",1.8);
    arrow(46*Math.cos(d.phi),46*Math.sin(d.phi),colors.a,"I",2.5);
    el("phasorTitle").textContent="電流フェーザ";
  }
  el("phaseLabel").textContent = fmt(d.phi*180/Math.PI,0)+"°";
}
function updateRead(){
  const d=calc();
  el("ratioLabel").textContent="f / f0 = "+fmt(d.ratio,2);
  el("rLabel").textContent=d.R+" Ω";
  const rows = mode==="series" ? [
    ["f0",fmtHz(d.fzero)],["f",fmtHz(d.f)],["Q",fmt(d.Q,2)],["XL",fmt(d.XL)+" Ω"],["XC",fmt(d.XC)+" Ω"],["|Z|",fmt(d.Z)+" Ω"],["|I|",fmt(d.I*1000)+" mA"],["φ",fmt(d.phi*180/Math.PI)+"°"]
  ] : [
    ["f0",fmtHz(d.fzero)],["f",fmtHz(d.f)],["Q",fmt(d.Q,2)],["XL",fmt(d.XL)+" Ω"],["XC",fmt(d.XC)+" Ω"],["|Z|",fmt(d.Z)+" Ω"],["Is",fmt(d.I*1000)+" mA"],["φ",fmt(d.phi*180/Math.PI)+"°"]
  ];
  read.innerHTML = rows.map(([k,v])=>`<div><span>${k}</span><span>${v}</span></div>`).join("");
}
function setMode(m){
  mode=m;
  el("tabSeries").classList.toggle("on",m==="series");
  el("tabParallel").classList.toggle("on",m==="parallel");
  render();
}
function render(){ drawStage(); drawCurve(); drawPhasor(); updateRead(); }
function loop(){ tick += 1; drawStage(); requestAnimationFrame(loop); }
el("tabSeries").onclick=()=>setMode("series");
el("tabParallel").onclick=()=>setMode("parallel");
ratioInput.oninput=render; rInput.oninput=render;
render(); requestAnimationFrame(loop);
</script>
</body>
</html>
