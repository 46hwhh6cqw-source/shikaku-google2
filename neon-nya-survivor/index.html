<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#050713"><title>NEON NYA SURVIVOR</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#050713;color:#eaf6ff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}canvas{display:block;width:100vw;height:100vh;background:#050713}.fallback{position:fixed;inset:0;display:grid;place-items:center;padding:24px;text-align:center;background:radial-gradient(circle at 50% 35%,#123a55,transparent 40%),#050713}.box{max-width:420px;border:1px solid #6ff;border-radius:22px;padding:22px;background:#071025cc;box-shadow:0 0 30px #28f4}body.run .fallback{display:none}</style></head><body><div class="fallback"><div class="box"><h1>NEON NYA</h1><p>起動中。ここが消えない場合はSafariで開いてください。</p><p>指ドラッグで移動、右下DASH、攻撃は自動。</p></div></div><canvas id="c"></canvas><script>(()=>{const C=document.getElementById('c'),x=C.getContext('2d');let W,H,D=1,hi=+localStorage.nyaHi||0;const R=Math.random,TA=Math.PI*2,cl=(v,a,b)=>Math.max(a,Math.min(b,v)),di=(a,b,c,d)=>(a-c)**2+(b-d)**2;function rs(){W=innerWidth;H=innerHeight;D=Math.min(2.4,devicePixelRatio||1);C.width=W*D;C.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();let P,E,B,Xp,Pt,T,st,joy,up;function newGame(){P={x:W/2,y:H*.55,r:14,h:100,mh:100,sp:250,dmg:13,fd:.32,cd:.2,mag:95,inv:0,dash:0,dc:0,orb:0,lv:1,xp:0,nx:14,k:0,sc:0};E=[];B=[];Xp=[];Pt=[];T=0;st='play';joy={on:0,sx:0,sy:0,x:0,y:0,lx:1,ly:0};up=[];for(let i=0;i<7;i++)spawn()}function spawn(t){let s=(R()*4)|0,m=50,e={age:0,cd:R()+.5,type:t||'n'};e.x=s==0?R()*W:s==1?W+m:s==2?R()*W:-m;e.y=s==0?-m:s==1?R()*H:s==2?H+m:R()*H;let z=1+T/170;if(t=='boss')Object.assign(e,{r:42,h:520+T*7,sp:36,col:'#ff36e8',xp:35,sc:700,d:22,boss:1});else if(T>45&&R()<.18)Object.assign(e,{r:10,h:15*z,sp:205,col:'#ffd166',xp:2,sc:28,d:8,type:'fast'});else if(T>70&&R()<.16)Object.assign(e,{r:20,h:72*z,sp:62,col:'#ff5c7a',xp:6,sc:55,d:16,type:'big'});else if(T>55&&R()<.18)Object.assign(e,{r:14,h:36*z,sp:70,col:'#8c7bff',xp:4,sc:45,d:10,type:'gun'});else Object.assign(e,{r:12,h:23*z,sp:105+T*.2,col:'#ff4fd8',xp:2,sc:20,d:10});e.mh=e.h;E.push(e)}function nearest(){let q=null,bd=9e9;for(const e of E){let d=di(P.x,P.y,e.x,e.y);if(d<bd)bd=d,q=e}return q}function shoot(){let e=nearest();if(!e)return;let a=Math.atan2(e.y-P.y,e.x-P.x),n=1+(P.spread||0),gap=.14;for(let i=0;i<n;i++){let aa=a+(i-(n-1)/2)*gap;B.push({x:P.x+Math.cos(aa)*18,y:P.y+Math.sin(aa)*18,vx:Math.cos(aa)*650,vy:Math.sin(aa)*650,r:4,d:P.dmg,life:1,p:P.pierce||0})}}function hurt(n){if(P.inv>0)return;P.h-=n;P.inv=.65;shake=10;boom(P.x,P.y,18,'#ff5c9a');if(navigator.vibrate)navigator.vibrate(25);if(P.h<=0){st='over';hi=Math.max(hi,P.sc);localStorage.nyaHi=hi}}let shake=0,bossAt=65;function boom(px,py,n,col){for(let i=0;i<n;i++){let a=R()*TA,s=40+R()*220;Pt.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,t:.25+R()*.45,m:.7,col,r:2+R()*3})}}function gain(v){P.xp+=v;while(P.xp>=P.nx){P.xp-=P.nx;P.lv++;P.nx=(P.nx*1.25+7)|0;st='up';up=[['火力+35%',()=>P.dmg*=1.35],['連射+18%',()=>P.fd=Math.max(.09,P.fd*.82)],['移動+16%',()=>P.sp*=1.16],['磁力+50',()=>P.mag+=50],['最大HP+25',()=>{P.mh+=25;P.h=Math.min(P.mh,P.h+45)}],['分裂弾',()=>P.spread=Math.min(4,(P.spread||0)+1)],['貫通+1',()=>P.pierce=(P.pierce||0)+1],['護衛オーブ',()=>P.orb=Math.min(5,P.orb+1)]].sort(()=>R()-.5).slice(0,3);boom(P.x,P.y,35,'#8cffd8');break}}}function step(dt){if(st!='play'){particles(dt);return}T+=dt;shake=Math.max(0,shake-dt*18);P.inv=Math.max(0,P.inv-dt);P.dc=Math.max(0,P.dc-dt);P.cd-=dt;let sx=joy.x,sy=joy.y,l=Math.hypot(sx,sy)||1;if(Math.abs(sx)+Math.abs(sy)>.08){sx/=l;sy/=l;joy.lx=sx;joy.ly=sy}else sx=sy=0;if(P.dash>0){P.dash-=dt;P.x+=joy.lx*820*dt;P.y+=joy.ly*820*dt}else{P.x+=sx*P.sp*dt;P.y+=sy*P.sp*dt}P.x=cl(P.x,18,W-18);P.y=cl(P.y,18,H-18);if(P.cd<=0){P.cd=P.fd;shoot()}if(T>bossAt){spawn('boss');bossAt+=85;shake=12}if(R()<cl(.018+T/9000,.018,.08))spawn();for(let i=E.length-1;i>=0;i--){let e=E[i],a=Math.atan2(P.y-e.y,P.x-e.x),d=Math.hypot(P.x-e.x,P.y-e.y)||1;e.age+=dt;e.cd-=dt;if(e.type=='gun'&&d<260){e.x-=Math.cos(a)*e.sp*.55*dt;e.y-=Math.sin(a)*e.sp*.55*dt;if(e.cd<=0){e.cd=1.7;let aa=a;B.push({x:e.x,y:e.y,vx:Math.cos(aa)*-260,vy:Math.sin(aa)*-260,r:6,d:12,life:4,enemy:1})}}else{let w=e.type=='fast'?Math.sin(e.age*8)*.7:0;e.x+=(Math.cos(a)-Math.sin(a)*w)*e.sp*dt;e.y+=(Math.sin(a)+Math.cos(a)*w)*e.sp*dt}if(di(P.x,P.y,e.x,e.y)<(P.r+e.r)**2)hurt(e.d)}for(let i=B.length-1;i>=0;i--){let b=B[i];b.life-=dt;b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.life<0||b.x<-80||b.x>W+80||b.y<-80||b.y>H+80){B.splice(i,1);continue}if(b.enemy){if(di(b.x,b.y,P.x,P.y)<(b.r+P.r)**2){B.splice(i,1);hurt(b.d)}continue}for(let j=E.length-1;j>=0;j--){let e=E[j];if(di(b.x,b.y,e.x,e.y)<(b.r+e.r)**2){e.h-=b.d;boom(b.x,b.y,3,'#78f7ff');if(e.h<=0){E.splice(j,1);P.k++;P.sc+=e.sc;Xp.push({x:e.x,y:e.y,v:e.xp,r:e.boss?9:5});boom(e.x,e.y,e.boss?80:18,e.col)}if(b.p>0)b.p--;else{B.splice(i,1);break}}}}for(let i=Xp.length-1;i>=0;i--){let g=Xp[i],d=Math.hypot(P.x-g.x,P.y-g.y)||1;if(d<P.mag){g.x+=(P.x-g.x)/d*(250+(P.mag-d)*5)*dt;g.y+=(P.y-g.y)/d*(250+(P.mag-d)*5)*dt}if(d<P.r+14){Xp.splice(i,1);gain(g.v);P.sc+=g.v*2}}if(P.orb)for(let k=0;k<P.orb;k++){let a=T*(2.5+P.orb*.2)+k*TA/P.orb,ox=P.x+Math.cos(a)*(48+k*3),oy=P.y+Math.sin(a)*(48+k*3);for(const e of E)if(di(ox,oy,e.x,e.y)<(e.r+9)**2)e.h-=P.dmg*dt*7}particles(dt)}function particles(dt){for(let i=Pt.length-1;i>=0;i--){let p=Pt[i];p.m-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.9;p.vy*=.9;if(p.m<=0)Pt.splice(i,1)}}function draw(){x.save();x.fillStyle='#050713';x.fillRect(0,0,W,H);let g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#06122b');g.addColorStop(.6,'#050713');g.addColorStop(1,'#19091f');x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle='#6ff2';x.lineWidth=1;for(let i=(-T*18)%42;i<W+60;i+=42){x.beginPath();x.moveTo(i,0);x.lineTo(i-80,H);x.stroke()}if(shake)x.translate((R()-.5)*shake,(R()-.5)*shake);for(const q of Xp){x.fillStyle='#8cffd8';x.shadowColor='#8cffd8';x.shadowBlur=12;x.beginPath();x.arc(q.x,q.y,q.r,0,TA);x.fill()}for(const b of B){x.fillStyle=b.enemy?'#ff8cff':'#7ff8ff';x.shadowColor=x.fillStyle;x.shadowBlur=14;x.beginPath();x.arc(b.x,b.y,b.r,0,TA);x.fill()}for(const e of E){x.fillStyle=e.col;x.shadowColor=e.col;x.shadowBlur=e.boss?30:18;x.beginPath();x.arc(e.x,e.y,e.r,0,TA);x.fill();x.strokeStyle='#fff9';x.stroke();if(e.boss){x.shadowBlur=0;x.fillStyle='#0008';x.fillRect(e.x-42,e.y-e.r-18,84,6);x.fillStyle='#fff';x.fillRect(e.x-42,e.y-e.r-18,84*cl(e.h/e.mh,0,1),6)}}for(let k=0;k<P.orb;k++){let a=T*(2.5+P.orb*.2)+k*TA/P.orb,ox=P.x+Math.cos(a)*(48+k*3),oy=P.y+Math.sin(a)*(48+k*3);x.fillStyle='#dff';x.shadowColor='#6ff';x.shadowBlur=18;x.beginPath();x.arc(ox,oy,7,0,TA);x.fill()}x.fillStyle=P.inv>0?'#fff':'#7cf7ff';x.shadowColor='#7cf7ff';x.shadowBlur=25;x.beginPath();x.arc(P.x,P.y,P.r,0,TA);x.fill();x.fillStyle='#061322';x.beginPath();x.arc(P.x+5,P.y-4,2,0,TA);x.arc(P.x+5,P.y+5,2,0,TA);x.fill();for(const p of Pt){x.globalAlpha=cl(p.m/.7,0,1);x.fillStyle=p.col;x.shadowColor=p.col;x.shadowBlur=12;x.beginPath();x.arc(p.x,p.y,p.r,0,TA);x.fill();x.globalAlpha=1}x.restore();ui();if(st=='menu')menu();if(st=='up')level();if(st=='over')over()}function bar(x0,y,w,h,v,c){x.fillStyle='#ffffff22';round(x0,y,w,h,5);x.fillStyle=c;round(x0,y,w*cl(v,0,1),h,5)}function round(a,b,w,h,r){x.beginPath();x.roundRect(a,b,w,h,r);x.fill()}function ui(){x.shadowBlur=0;x.font='800 13px -apple-system';bar(14,16,180,10,P.h/P.mh,'#ff5d8f');bar(14,32,220,7,P.xp/P.nx,'#8cffd8');x.fillStyle='#eaf6ff';x.fillText('Lv.'+P.lv,244,39);x.textAlign='center';x.fillText(((T/60)|0)+':'+('0'+(T%60|0)).slice(-2)+'  '+P.sc+'pt',W/2,22);x.textAlign='right';x.fillText('BEST '+hi,W-14,22);if(st=='play'){let r=52,bx=W-r-18,by=H-r-22;x.textAlign='center';x.strokeStyle=P.dc<=0?'#8cf':'#fff5';x.fillStyle=P.dc<=0?'#7ff2':'#fff1';x.lineWidth=2;x.beginPath();x.arc(bx,by,r,0,TA);x.fill();x.stroke();x.fillStyle='#fff';x.fillText('DASH',bx,by+4);if(joy.on){x.strokeStyle='#fff4';x.beginPath();x.arc(joy.sx,joy.sy,62,0,TA);x.stroke();x.fillStyle='#dff8';x.beginPath();x.arc(joy.sx+joy.x*62,joy.sy+joy.y*62,14,0,TA);x.fill()}}}function menu(){x.fillStyle='#0008';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#fff';x.shadowColor='#6ff';x.shadowBlur=18;x.font='1000 42px -apple-system';x.fillText('NEON NYA',W/2,H*.34);x.font='800 15px -apple-system';x.shadowBlur=0;x.fillText('指ドラッグで移動 / 右下DASH / 攻撃自動',W/2,H*.47);x.fillText('経験値を拾って強化、ボスを倒して生き残れ',W/2,H*.51);x.font='900 20px -apple-system';x.shadowBlur=12;x.fillText('タップして開始',W/2,H*.66)}function level(){x.fillStyle='#0009';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#fff';x.shadowColor='#8cffd8';x.shadowBlur=18;x.font='1000 30px -apple-system';x.fillText('LEVEL UP',W/2,H*.22);let w=Math.min(W-40,380),h=72,y=H*.34;up.forEach((u,i)=>{x.shadowBlur=0;x.fillStyle='#10243dcc';round((W-w)/2,y+i*(h+14),w,h,18);x.strokeStyle='#8cf8';x.stroke();x.fillStyle='#fff';x.font='900 18px -apple-system';x.fillText(u[0],W/2,y+i*(h+14)+43)})}function over(){x.fillStyle='#000a';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#fff';x.shadowColor='#ff5d8f';x.shadowBlur=18;x.font='1000 36px -apple-system';x.fillText('GAME OVER',W/2,H*.34);x.font='800 17px -apple-system';x.shadowBlur=0;x.fillText(P.sc+' pt / KILL '+P.k,W/2,H*.45);x.fillText('BEST '+hi,W/2,H*.50);x.font='900 20px -apple-system';x.shadowBlur=12;x.fillText('タップで再挑戦',W/2,H*.65)}function dash(){if(st!='play'||P.dc>0)return;P.dc=1.35;P.dash=.18;P.inv=Math.max(P.inv,.28);boom(P.x,P.y,25,'#78f7ff')}function pt(e){let r=C.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function down(e){e.preventDefault();let p=pt(e);if(st=='menu'||st=='over'){newGame();return}if(st=='up'){let w=Math.min(W-40,380),h=72,y=H*.34;for(let i=0;i<up.length;i++)if(p.x>(W-w)/2&&p.x<(W+w)/2&&p.y>y+i*(h+14)&&p.y<y+i*(h+14)+h){up[i][1]();st='play'}return}let r=52,bx=W-r-18,by=H-r-22;if(di(p.x,p.y,bx,by)<r*r){dash();return}joy.on=1;joy.id=e.pointerId;joy.sx=p.x;joy.sy=p.y;joy.x=joy.y=0}function move(e){if(!joy.on||e.pointerId!=joy.id)return;e.preventDefault();let p=pt(e),dx=p.x-joy.sx,dy=p.y-joy.sy,l=Math.hypot(dx,dy),m=l>62?62/l:1;joy.x=dx*m/62;joy.y=dy*m/62}function upfn(e){if(e.pointerId==joy.id){joy.on=0;joy.x=joy.y=0}}C.addEventListener('pointerdown',down,{passive:false});C.addEventListener('pointermove',move,{passive:false});C.addEventListener('pointerup',upfn);C.addEventListener('pointercancel',upfn);addEventListener('keydown',e=>{if(e.code=='Space')dash();if(st=='menu'||st=='over')newGame()});P={h:1,mh:1,xp:0,nx:1,lv:1,sc:0,k:0};st='menu';let last=performance.now();function loop(n){let dt=cl((n-last)/1000,0,.033);last=n;step(dt);draw();document.body.classList.add('run');requestAnimationFrame(loop)}requestAnimationFrame(loop)})()</script></body></html>
